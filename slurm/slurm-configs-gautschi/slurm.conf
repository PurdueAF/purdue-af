######################################
# This file is maintained with
# RCAC configuration management.
# Your changes will be clobbered.
######################################
#
# slurm.conf file generated by configurator.html.
# Put this file on all nodes of your cluster.
# See the slurm.conf man page for more information.
#
######
# Main slurm daemon config
######
SlurmctldHost=adm.gautschi.rcac.purdue.edu
#
AuthType=auth/munge
AuthAltTypes=auth/jwt
AuthAltParameters=jwt_key=/var/spool/slurm/slurm.state/jwt_hs256.key
#CheckpointType=checkpoint/none
CryptoType=crypto/munge
#DisableRootJobs=NO
EnforcePartLimits=ANY
Epilog=/etc/slurm/epilog.d/*
#EpilogSlurmctld=
#FirstJobId=1
#MaxJobId=999999
GresTypes=gpu,hp_cpu
#GroupUpdateForce=0
#GroupUpdateTime=600
#JobCheckpointDir=/var/slurm/checkpoint
#JobCredentialPrivateKey=
#JobCredentialPublicCertificate=
#JobFileAppend=0
#JobRequeue=1
JobSubmitPlugins=lua
LaunchParameters=use_interactive_step
InteractiveStepOptions="--interactive --preserve-env --pty $SHELL -l"
#KillOnBadExit=0
#LaunchType=launch/slurm
#Licenses=foo*4,bar
MailProg=/bin/mail
MaxJobCount=1000000
MaxArraySize=20001
#MaxStepCount=40000
#MaxTasksPerNode=512
MpiDefault=none
#MpiParams=ports=#-#
#PluginDir=
#PlugStackConfig=
#PrivateData=jobs
ProctrackType=proctrack/cgroup
Prolog=/etc/slurm/prolog.d/*
PrologFlags=x11,contain
#PrologSlurmctld=
PropagatePrioProcess=2
#PropagateResourceLimits=
#PropagateResourceLimitsExcept=
RebootProgram=/usr/site/rcac/sbin/stateless_reboot.sh
ReturnToService=1
#SallocDefaultCommand=
SlurmctldParameters=enable_configless,conmgr_max_connections=256,rl_enable,rl_refill_period=1,rl_refill_rate=2,rl_bucket_size=5000,rl_table_size=8192
SlurmctldPidFile=/run/slurm/slurmctld.pid
SlurmctldPort=6817
SlurmdPidFile=/run/slurm/slurmd.pid
SlurmdPort=6818
SlurmdSpoolDir=/var/spool/slurm
SlurmUser=slurm
#SlurmdUser=root
#SrunEpilog=
#SrunProlog=
StateSaveLocation=/var/spool/slurm/slurm.state
SwitchType=switch/none
#TaskEpilog=
TaskPlugin=affinity,cgroup
#TaskPluginParam=
TaskProlog=/etc/slurm/slurm-task-prolog

### REVISIT THE IB TOPOLOGY
TopologyPlugin=topology/tree

# The tmpting place to put things.
TmpFS=/tmp

# This tells slurm to create a space in TmpFS and
# and bind mount /dev/shm and /tmp to it within the 
# job's mount namespace.
JobContainerType=job_container/tmpfs

#TrackWCKey=no
#TreeWidth=
#UnkillableStepProgram=
#UsePAM=0
ScronParameters=enable
#
#
######
# TIMERS
######

#BatchStartTimeout=10
#CompleteWait=0
#EpilogMsgTime=2000
#GetEnvTimeout=2
InactiveLimit=0
KillWait=30
MessageTimeout=30
#ResvOverRun=0
MinJobAge=300
#OverTimeLimit=0
SlurmctldTimeout=120
SlurmdTimeout=3600
UnkillableStepTimeout=250
#VSizeFactor=0
Waittime=0
#
######
# NHC
######
HealthCheckInterval=600
HealthCheckProgram=/usr/sbin/nhc
HealthCheckNodeState=ANY

#
######
# SCHEDULING
######
#
# No mem-per-cpu limit here - set it in partitions (Gautschi)
#DefMemPerCPU=1992
#MaxMemPerCPU=1992
#SchedulerTimeSlice=30
SchedulerType=sched/backfill
SchedulerParameters=bf_interval=60,bf_window=10800,bf_resolution=300,bf_max_job_test=2000,bf_max_job_assoc=50,bf_continue,max_rpc_cnt=150
#SelectType=select/cons_res
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory
PreemptType=preempt/qos
PreemptMode=REQUEUE
#
#
######
# JOB PRIORITY
######
#PriorityFlags=
PriorityType=priority/multifactor
PriorityDecayHalfLife=0
#PriorityCalcPeriod=00:05:00
PriorityFavorSmall=NO
PriorityMaxAge=7-00:00:00
PriorityUsageResetPeriod=NONE
PriorityWeightAge=500
#PriorityWeightFairshare=50000
PriorityWeightJobSize=500
PriorityWeightPartition=500
PriorityWeightQOS=500
#
#
######
# LOGGING AND ACCOUNTING
######
AccountingStorageEnforce=associations,limits,qos,safe
AccountingStorageHost=adm.gautschi.rcac.purdue.edu
#AccountingStorageLoc=
#AccountingStoragePass=
#AccountingStoragePort=6819
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageUser=slurm
AccountingStoreFlags=job_script,job_env,job_comment
AccountingStorageTRES=gres/gpu,gres/gpu:l40,gres/gpu:h100,gres/gpu:h200,gres/hp_cpu,billing
ClusterName=gautschi
#DebugFlags=
#JobCompHost=
JobCompLoc=/var/log/slurm/job_comp.log
#JobCompPass=
#JobCompPort=
JobCompType=jobcomp/filetxt
#JobCompUser=
#JobContainerType=job_container/none
#JobAcctGatherFrequency=30
JobAcctGatherType=jobacct_gather/linux
SlurmctldDebug=3
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=3
SlurmdLogFile=/var/log/slurm/slurmd.log
#SlurmSchedLogFile=
#SlurmSchedLogLevel=
#
#
######
# POWER SAVE SUPPORT FOR IDLE NODES (optional)
######
#SuspendProgram=
#ResumeProgram=
#SuspendTimeout=
ResumeTimeout=1200
#ResumeRate=
#SuspendExcNodes=
#SuspendExcParts=
#SuspendRate=
#SuspendTime=
#
#
######
