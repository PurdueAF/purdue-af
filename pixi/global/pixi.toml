[workspace]
authors = ["Dmitry Kondratyev"]
channels = ["conda-forge"]
name = "pixi-global"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
awkward = "*"
awkward-pandas = "*"
bokeh = "3.1.0.*"
# boost = "*"
cabinetry = "*"
ca-certificates = "*"
certifi = "*"
click = "*"
