# Test overlay applied ON TOP of the production values.yaml in kind.
# Nulls out cluster-specific machinery (geddes registry, NFS/CVMFS mounts,
# RWX storage, node placement, letsencrypt) and points the UNMODIFIED
# production authenticator at the mock CILogon. `null` deletes the key
# (helm map-merge semantics); lists replace wholesale.

hub:
  image:
    name: quay.io/jupyterhub/k8s-hub-slim # upstream twin of the cached prod image
  nodeSelector: null # maps: null deletes
  tolerations: [] # lists: empty replaces (chart concat()s them — null nil-pointers)
  resources: null
  db:
    type: sqlite-memory
    pvc: null
  config:
    PurdueCILogonOAuthenticator:
      # Browser-side URL (test client reaches the mock via port-forward);
      # server-side URLs use the in-cluster service DNS.
      authorize_url: http://localhost:9090/authorize
      token_url: http://mock-cilogon.default.svc.cluster.local:9090/oauth2/token
      userdata_url: http://mock-cilogon.default.svc.cluster.local:9090/oauth2/userinfo
  services:
    # (agentic-interface stays as in prod values: an external-service URL the
    # hub never health-checks — harmless while the service isn't deployed)
    e2e:
      apiToken: e2e-admin-token-not-a-secret
  loadRoles:
    e2e-admin:
      services: [e2e]
      scopes: ["admin:users", "admin:servers", "read:hub"]

proxy:
  https:
    enabled: false
  service:
    type: ClusterIP
    extraPorts: []
  chp:
    nodeSelector: null
    tolerations: []
    resources: null
  # autohttps is disabled above; null only the placement keys (nulling the
  # whole traefik map risks nil-pointer errors in chart template helpers)
  traefik:
    nodeSelector: null
    tolerations: []
    extraPorts: []

singleuser:
  uid: null # sample image runs as jovyan
  image:
    name: quay.io/jupyterhub/k8s-singleuser-sample
    tag: "__CHART_VERSION__" # z2jh tags images with the chart version (setup-kind.sh substitutes)
  startTimeout: 300
  extraContainers: [] # prod's af-pod-monitor sidecar mounts volumes removed below
  storage:
    type: none
    extraVolumes: []
    extraVolumeMounts: []
  # One minimal profile keeps the profileList code path exercised without
  # geddes images, GPUs, or node selectors.
  profileList:
    - display_name: "E2E test profile"
      default: true
      kubespawner_override:
        image: "quay.io/jupyterhub/k8s-singleuser-sample:__CHART_VERSION__"

scheduling:
  userPods:
    tolerations: []

ingress:
  enabled: false
