# Test overlay applied ON TOP of the production values.yaml in kind.
# Nulls out cluster-specific machinery (geddes registry, NFS/CVMFS mounts,
# RWX storage, node placement, letsencrypt) and points the UNMODIFIED
# production authenticator at the mock CILogon. `null` deletes the key
# (helm map-merge semantics); lists replace wholesale.

hub:
  image:
    name: quay.io/jupyterhub/k8s-hub-slim # upstream twin of the cached prod image
  nodeSelector: null # maps: null deletes
  tolerations: [] # lists: empty replaces (chart concat()s them — null nil-pointers)
  resources: null
  db:
    type: sqlite-memory
    pvc: null
  config:
    KubeSpawner:
      http_timeout: 120 # 2-core CI runner: Lab cold-start can exceed the 30s default
    PurdueCILogonOAuthenticator:
      # Browser-side URL (test client reaches the mock via port-forward);
      # server-side URLs use the in-cluster service DNS.
      authorize_url: http://localhost:9090/authorize
      token_url: http://mock-cilogon.default.svc.cluster.local:9090/oauth2/token
      userdata_url: http://mock-cilogon.default.svc.cluster.local:9090/oauth2/userinfo
  services:
    # (agentic-interface stays as in prod values: an external-service URL the
    # hub never health-checks — harmless while the service isn't deployed)
    e2e:
      apiToken: e2e-admin-token-not-a-secret
  # maps merge: these ADD to prod's hub.extraEnv (CILOGON_* stay intact).
  # Point set-user-info.py's ldap_lookup() at the plaintext mock LDAP.
  extraEnv:
    AF_LDAP_HOST: mock-ldap.default.svc.cluster.local
    AF_LDAP_TLS: "false"
  loadRoles:
    e2e-admin:
      services: [e2e]
      scopes: ["admin:users", "admin:servers", "read:hub"]

proxy:
  https:
    enabled: false
  service:
    type: ClusterIP
    extraPorts: []
  chp:
    nodeSelector: null
    tolerations: []
    resources: null
  # autohttps is disabled above; null only the placement keys (nulling the
  # whole traefik map risks nil-pointer errors in chart template helpers)
  traefik:
    nodeSelector: null
    tolerations: []
    extraPorts: []

singleuser:
  uid: null # AF image entrypoint drops to jovyan
  # prod's start-singleuser.sh is docker-stacks-specific and assumes cluster
  # mounts absent in kind; the real AF image also ships `jupyterhub-singleuser`
  # on PATH, so boot via it here (the start-singleuser.sh path is exercised on
  # the real cluster, not in kind).
  cmd: jupyterhub-singleuser
  # No mock/sample image anywhere: the base image is the REAL production image
  # pinned in values.yaml, remapped geddes-proxy→ghcr by setup-kind.sh. Every
  # spawn test runs against a real AF image (production or pre-release).
  image:
    name: __PRODUCTION_IMAGE_NAME__
    tag: "__PRODUCTION_IMAGE_TAG__"
  image_pull_policy: IfNotPresent # pre-pulled onto the node by setup-kind.sh
  startTimeout: 600 # real AF image cold-start on a 2-core runner is slow
  extraContainers: [] # prod's af-pod-monitor sidecar mounts volumes removed below
  storage:
    type: none
    extraVolumes: []
    extraVolumeMounts: []
  # Profiles carry NO resource guarantees or node selectors (kind has neither
  # the memory nor the labels), so several real-image pods can coexist.
  profileList:
    # Default = the image production runs (values.yaml singleuser.image.tag).
    # The "e2e = production" gate: every commit proves the current hub config
    # spawns the exact production image. Also the base for the plumbing tests.
    - display_name: "E2E production"
      slug: production
      default: true
      kubespawner_override:
        image: "__PRODUCTION_IMAGE__"
        image_pull_policy: IfNotPresent
        environment:
          E2E_PROFILE_MARKER: "production"
    # Env marker profile: lets tests assert that explicit profile selection
    # (user_options {"profile": <slug>}) lands in the pod — the contract the
    # agentic interface's start_af_session uses. Real image, no stand-in.
    - display_name: "E2E alt profile"
      slug: e2e-alt-profile
      kubespawner_override:
        image: "__PRODUCTION_IMAGE__"
        image_pull_policy: IfNotPresent
        environment:
          E2E_PROFILE_MARKER: "alt"
    # Pre-release profile: spawns the REAL AF image built by THIS pipeline
    # (in-<hash> of the current repo state, else the promoted :pre-release).
    # setup-kind.sh substitutes the ref and pre-pulls it; the e2e-pre-release
    # job runs the matching test with E2E_PRERELEASE=1.
    - display_name: "E2E pre-release"
      slug: pre-release
      kubespawner_override:
        image: "__PRERELEASE_IMAGE__"
        image_pull_policy: IfNotPresent
        environment:
          E2E_PROFILE_MARKER: "pre-release"

scheduling:
  userPods:
    tolerations: []

ingress:
  enabled: false
