name: Build AF Image (experiment)

# Viability test: can the purdue-af image be built on GitHub-hosted runners?
# The previous attempt (alma8 + hand-installed CUDA toolkit) exceeded runner
# limits and was reverted (ed8e24cd). The docker/purdue-af-new rebuild on an
# NVIDIA base is ~5 GB compressed / ~10 min on kaniko, so it may now fit.
#
# Deliberately separate from the regular CI (build-images.yml). If this
# proves reliable, it graduates there as the purdue-af entry and the
# in-cluster kaniko job becomes the fallback; if not, delete this file.
#
# The Dockerfile's FROM points at the geddes docker-hub-cache proxy, which
# GH runners cannot reach — the buildx named context below remaps that exact
# ref to docker.io without modifying the Dockerfile.

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/purdue-af-new/**"
      - "pixi/base/**"
      - "slurm/slurm-configs-hammer/**"
      - "slurm/*.rpm"
      - ".github/workflows/build-af-new.yml"

permissions:
  contents: read
  packages: write # ghcr push + registry build cache

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/purdueaf/purdue-af-new:sha-${{ github.sha }}
  # keep in sync with the FROM line in docker/purdue-af-new/Dockerfile
  GEDDES_BASE: geddes-registry.rcac.purdue.edu/docker-hub-cache/nvidia/cuda:12.4.1-devel-rockylinux8
  PUBLIC_BASE: docker.io/nvidia/cuda:12.4.1-devel-rockylinux8

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@v1.3.1 # Renovate pins to digest
        with:
          tool-cache: true
          docker-images: false
      - name: Disk before build
        run: df -h / | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      # Login first: cache-from needs read; cache-to/push need write (main).
      - name: Login to ghcr.io
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4 # Renovate pins to digest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/purdue-af-new/Dockerfile
          tags: ${{ env.IMAGE }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-contexts: |
            ${{ env.GEDDES_BASE }}=docker-image://${{ env.PUBLIC_BASE }}
          push: false
          load: true
          # Registry-backed cache — the 10 GB GHA cache cannot hold this
          # layer set. ignore-error keeps fork PRs (read-only token) building.
          cache-from: type=registry,ref=ghcr.io/purdueaf/purdue-af-new:buildcache
          cache-to: type=registry,ref=ghcr.io/purdueaf/purdue-af-new:buildcache,mode=max,ignore-error=true
      - name: Disk after build
        run: |
          df -h / | tee -a "$GITHUB_STEP_SUMMARY"
          docker image ls "$IMAGE" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Smoke test
        run: |
          docker run --rm "$IMAGE" sh -c '
            nvcc --version >/dev/null &&
            python3 -c "import jupyterlab; print(\"smoke ok:\", jupyterlab.__version__)"'
      # Only smoke-tested images ever reach the registry.
      - name: Push to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "$IMAGE"
      - name: Size report (layer breakdown)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          {
            echo ""
            echo '```'
            python3 docker/kaniko-build-jobs/analyze_image_build.py --image "$IMAGE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
