name: Build Images (heavy)

# OS-scale images (alma8 + slurm): built when their sources change
# (a Renovate FROM bump counts) plus a weekly run to catch base-image drift.
# No GHA layer cache here — exporting multi-GB layers to the capped, throttled
# cache service costs more time than it saves on weekly builds.
#
# NOT built here:
#   - docker/purdue-af — the multi-GB pixi stack needs cluster-grade CPU and
#     registry locality; GitHub-hosted runners take hours where the in-cluster
#     kaniko job (docker/kaniko-build-jobs/build-af.yaml) takes ~20 min.
#     Stays on kaniko; CI-triggered cluster builds are IMPROVEMENT_PLAN item 14.
#   - docker/interlink-slurm-plugin — too slow on hosted runners and likely
#     to be retired; build via the kaniko job when needed.
#   - docker/servicex-science-coffea — private geddes-registry base image.

on:
  push:
    paths:
      - "docker/dask-gateway-server/**"
      - "slurm/slurm-configs-*/**"
      - ".github/workflows/build-images-heavy.yml"
  pull_request:
    paths:
      - "docker/dask-gateway-server/**"
      - "slurm/slurm-configs-*/**"
      - ".github/workflows/build-images-heavy.yml"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC, pairs with the Renovate window
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # The base dask-gateway-server/Dockerfile is a stale pre-split
          # leftover (references a renamed configs dir); only the per-cluster
          # variants are real build targets (same as the kaniko jobs).
          - name: dask-gateway-server-hammer
            dockerfile: docker/dask-gateway-server/Dockerfile.hammer
            context: .
            smoke: python3 -c "import dask_gateway_server; print('ok')"
          - name: dask-gateway-server-gautschi
            dockerfile: docker/dask-gateway-server/Dockerfile.gautschi
            context: .
            smoke: python3 -c "import dask_gateway_server; print('ok')"
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.name }}:ci
          push: false
          load: true
      - name: Smoke test
        run: docker run --rm ${{ matrix.name }}:ci ${{ matrix.smoke }}
