name: Build Images (heavy)

# Large images (purdue-af pixi stack, interlink, dask-gateway variants,
# servicex-science): built on path changes + weekly, smoke-tested, and
# pushed to ghcr.io/purdueaf/<name>:sha-<commit> on main.
#
# Caching is REGISTRY-backed (ghcr :buildcache refs), not GHA cache — the
# 10 GB GHA cap cannot hold these layer sets. First builds are slow
# (purdue-af potentially hours); subsequent builds rebuild only changed
# stages, pulling the rest from the cache ref. `ignore-error=true` keeps
# fork PRs (read-only token, cache export denied) building.

on:
  push:
    paths:
      - "docker/purdue-af/**"
      - "docker/interlink-slurm-plugin/**"
      - "docker/dask-gateway-server/**"
      - "docker/servicex-science-coffea/**"
      - "slurm/slurm-configs-*/**"
      - "slurm/*.rpm"
      - ".github/workflows/build-images-heavy.yml"
  pull_request:
    paths:
      - "docker/purdue-af/**"
      - "docker/interlink-slurm-plugin/**"
      - "docker/dask-gateway-server/**"
      - "docker/servicex-science-coffea/**"
      - "slurm/slurm-configs-*/**"
      - "slurm/*.rpm"
      - ".github/workflows/build-images-heavy.yml"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC, keeps the build cache warm
  workflow_dispatch:

permissions:
  contents: read
  packages: write # ghcr push + registry build cache

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: purdue-af
            dockerfile: docker/purdue-af/Dockerfile
            context: .
            smoke: python3 -c "import jupyterlab; print('ok')"
          - name: interlink-slurm-plugin
            dockerfile: docker/interlink-slurm-plugin/Dockerfile.alma8
            context: .
            smoke: test -x /sidecar/slurm-sidecar
          - name: servicex-science-coffea
            dockerfile: docker/servicex-science-coffea/Dockerfile
            context: .
            smoke: python -c "import coffea; print('ok')"
          # The base dask-gateway-server/Dockerfile is a stale pre-split
          # leftover (references a renamed configs dir); only the per-cluster
          # variants are real build targets (same as the kaniko jobs).
          - name: dask-gateway-server-hammer
            dockerfile: docker/dask-gateway-server/Dockerfile.hammer
            context: .
            smoke: python3 -c "import dask_gateway_server; print('ok')"
          - name: dask-gateway-server-gautschi
            dockerfile: docker/dask-gateway-server/Dockerfile.gautschi
            context: .
            smoke: python3 -c "import dask_gateway_server; print('ok')"
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@v1.3.1 # Renovate pins to digest
        with:
          tool-cache: true
          docker-images: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      # Login first: cache-from needs read; cache-to/push need write (main).
      - name: Login to ghcr.io
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3 # Renovate pins to digest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ghcr.io/purdueaf/${{ matrix.name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          push: false
          load: true
          cache-from: type=registry,ref=ghcr.io/purdueaf/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/purdueaf/${{ matrix.name }}:buildcache,mode=max,ignore-error=true
      - name: Smoke test
        run: docker run --rm ghcr.io/purdueaf/${{ matrix.name }}:sha-${{ github.sha }} ${{ matrix.smoke }}
      # Only smoke-tested images ever reach the registry.
      - name: Push to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ghcr.io/purdueaf/${{ matrix.name }}:sha-${{ github.sha }}
