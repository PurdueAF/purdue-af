name: Lint Dockerfiles

on:
  push:
    paths:
      - "**/Dockerfile*"
  pull_request:
    paths:
      - "**/Dockerfile*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HADOLINT_VERSION: v2.14.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install hadolint
        run: |
          sudo curl -fsSL "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-$(uname -s)-$(uname -m)" -o /bin/hadolint
          sudo chmod +x /bin/hadolint
      - name: Run hadolint
        run: |
          git ls-files | grep -iE '(^|/)Dockerfile[^/]*$' | grep -v '^docker/dask-gateway-server/' \
            | xargs hadolint --ignore DL3041 --ignore DL3033 --failure-threshold warning
