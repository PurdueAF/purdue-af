name: Pixi Check

# Validates every pixi workspace under pixi/:
#   • lock --check (manifest ↔ lock consistency)
#   • install --locked (environment actually builds)
#
# Pixi is pinned to v0.62.2 here and in docker/purdue-af/Dockerfile (PIXI_VERSION).
# Regenerate lock files with that exact version (lock format v6); newer pixi writes
# v7 locks that 0.62.2 cannot read.
#
# pixi/base backs the purdue-af user image; pixi/global is the shared HEP stack.
# Large Docker images stay on in-cluster kaniko — pixi CI replaces their validation.
#
# pixi/global is validated only once pixi/global/pixi.lock is committed.
# Until then the job is skipped (no lock file to check against pixi 0.62.2).

on:
  push:
    paths:
      - "pixi/**"
      - ".github/workflows/pixi-check.yml"
  pull_request:
    paths:
      - "pixi/**"
      - ".github/workflows/pixi-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      global: ${{ steps.scope.outputs.global }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "global=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          case "${{ github.event_name }}" in
            pull_request)
              range="origin/${{ github.event.pull_request.base.ref }}...HEAD"
              ;;
            push)
              if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
                range="HEAD~1..HEAD"
              else
                range="${{ github.event.before }}..${{ github.sha }}"
              fi
              ;;
            *)
              echo "global=true" >> "${GITHUB_OUTPUT}"
              exit 0
              ;;
          esac
          if git diff --name-only "${range}" | grep -qE '^(pixi/global/|\.github/workflows/pixi-check\.yml)'; then
            echo "global=true" >> "${GITHUB_OUTPUT}"
          else
            echo "global=false" >> "${GITHUB_OUTPUT}"
          fi

  pixi-base:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: prefix-dev/setup-pixi@v0.9.0 # Renovate pins to digest
        with:
          pixi-version: v0.62.2
          manifest-path: pixi/base/pixi.toml
          run-install: false
      - name: Check lockfile
        working-directory: pixi/base
        run: pixi lock --check
      - uses: prefix-dev/setup-pixi@v0.9.0 # Renovate pins to digest
        with:
          pixi-version: v0.62.2
          manifest-path: pixi/base/pixi.toml
          environments: base-env
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

  pixi-global:
    needs: scope
    if: needs.scope.outputs.global == 'true' && hashFiles('pixi/global/pixi.lock') != ''
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: prefix-dev/setup-pixi@v0.9.0 # Renovate pins to digest
        with:
          pixi-version: v0.62.2
          manifest-path: pixi/global/pixi.toml
          run-install: false
      - name: Check lockfile and install
        working-directory: pixi/global
        run: pixi lock --check
      - uses: prefix-dev/setup-pixi@v0.9.0 # Renovate pins to digest
        with:
          pixi-version: v0.62.2
          manifest-path: pixi/global/pixi.toml
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
