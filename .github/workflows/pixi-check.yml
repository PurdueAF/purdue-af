name: Pixi Check

# Validates every pixi workspace under pixi/ with `pixi install --locked`
# (fails if pixi.toml and pixi.lock are out of sync), then import-smokes
# every direct dependency with pixi/check-env.py — each package in a fresh
# interpreter, INSIDE a rockylinux:8 container. The EL8 container matters:
# import failures like the pip-tensorflow `GLIBCXX_3.4.29` libstdc++
# shadowing only reproduce on an EL8 host (Ubuntu runners have a newer
# system libstdc++ and would silently pass).
#
# Pixi is pinned to v0.62.2 here and in docker/purdue-af/Dockerfile (PIXI_VERSION).
# pixi/global also needs CONDA_OVERRIDE_CUDA on CPU-only CI runners (see job env).

on:
  push:
    paths:
      - "pixi/**"
      - ".github/workflows/pixi-check.yml"
  pull_request:
    paths:
      - "pixi/**"
      - ".github/workflows/pixi-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pixi-base:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0 # Renovate pins to digest
        with:
          pixi-version: v0.62.2
          manifest-path: pixi/base/pixi.toml
          environments: base-env
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      - name: Import-smoke the base env (EL8 container, like production)
        run: |
          docker run --rm -v "$PWD:$PWD" -w "$PWD" rockylinux:8 \
            pixi/base/.pixi/envs/base-env/bin/python pixi/check-env.py \
              --manifest pixi/base/pixi.toml --env base-env

  pixi-global:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # pixi/global requires CUDA (system-requirements); mock it on CPU-only runners.
    env:
      CONDA_OVERRIDE_CUDA: "12.4"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Skip without lock file
        if: hashFiles('pixi/global/pixi.lock') == ''
        run: echo "pixi/global/pixi.lock not present — skipping"
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0 # Renovate pins to digest
        if: hashFiles('pixi/global/pixi.lock') != ''
        with:
          pixi-version: v0.62.2
          manifest-path: pixi/global/pixi.toml
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      - name: Import-smoke the global env (EL8 container, like production)
        if: hashFiles('pixi/global/pixi.lock') != ''
        run: |
          docker run --rm -v "$PWD:$PWD" -w "$PWD" rockylinux:8 \
            pixi/global/.pixi/envs/default/bin/python pixi/check-env.py \
              --manifest pixi/global/pixi.toml --env default
