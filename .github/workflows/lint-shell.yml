name: Lint Shell Scripts

on:
  push:
    paths:
      - "**.sh"
  pull_request:
    paths:
      - "**.sh"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SHFMT_VERSION: v3.7.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          curl -fsSL "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64" -o shfmt
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/
      - name: Check shell script formatting
        run: git ls-files '*.sh' | grep -v '^docker/dask-gateway-server/' | xargs shfmt -d
