# Build the Zensical documentation and deploy it to GitHub Pages.
#
# Two editions of the docs are built and published together:
#   - docs-md/      -> https://purdueaf.github.io/purdue-af/        (current docs)
#   - docs-md-alt/  -> https://purdueaf.github.io/purdue-af/alt/    (alternative docs)
# GitHub Pages allows only one site per repository, so the alternative edition is
# served under the /alt/ subpath of the same site for side-by-side comparison.
#
# One-time setup required in the repository settings:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
#
# After that, every push to `main` that touches docs-md/ or docs-md-alt/ rebuilds
# and publishes the site automatically. Remove the `paths:` filter below if you
# want the docs to rebuild on *every* push to main.
name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs-md/**"
      - "docs-md-alt/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.x
      - run: pip install zensical
      - name: Build current docs
        working-directory: docs-md
        run: zensical build --clean
      - name: Build alternative docs
        working-directory: docs-md-alt
        run: zensical build --clean
      - name: Assemble combined site
        run: |
          mkdir -p _site
          cp -r docs-md/site/. _site/
          mkdir -p _site/alt
          cp -r docs-md-alt/site/. _site/alt/
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        id: deployment
