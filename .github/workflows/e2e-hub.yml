name: Hub E2E

# Hub e2e + AF-image CI/CD in one workflow (jobs need ordering guarantees):
#
#   changes ─▶ build-image ─▶ e2e-prerelease ─▶ promote (main only)
#                    │
#             e2e-production (independent, unchanged behavior)
#
# - e2e-production: full JupyterHub stack in a throwaway kind cluster — the
#   chart version from helmrelease.yaml, real values.yaml, hub configmaps
#   derived from the production kustomization, mock CILogon + mock LDAP.
#   Spawns the lightweight sample image (stand-in for the production image,
#   which is what the production JH option uses today). See
#   tests/e2e_hub/README.md. Deliberately no version parameter: CI tests
#   exactly what the repo deploys.
#
# - build-image: when a commit touches the AF image inputs, builds
#   docker/purdue-af-new/Dockerfile, smoke-tests it (incl. sourcing
#   cmsset_default.sh from real CVMFS), and pushes the immutable
#   ghcr.io/purdueaf/purdue-af:sha-<commit>.
#
# - e2e-prerelease: same kind stack, but spawns the REAL AF image through the
#   hub's pre-release profile — the freshly built sha-<commit> when this
#   commit rebuilt the image (guaranteed ordering via `needs`), otherwise the
#   currently promoted :pre-release tag (hub-config changes, weekly cron).
#
# - promote: on main, after the pre-release e2e passes, moves the
#   ghcr.io/purdueaf/purdue-af:pre-release tag to the tested digest. The
#   hub's "Latest pre-release version" profile pulls that tag with
#   image_pull_policy Always, so validated builds reach users automatically.
#   Production stays pinned in values.yaml (future work: same flow for prod).

on:
  push:
    paths:
      - "apps/jupyterhub/jupyterhub/**"
      - "deploy/core-production/kustomization.yaml" # source of truth for hub configmaps
      - "tests/e2e_hub/**"
      - ".github/workflows/e2e-hub.yml"
      # AF image inputs (build-image + e2e-prerelease + promote)
      - "docker/purdue-af-new/**"
      - "pixi/base/**"
      - "slurm/slurm-configs-hammer/**"
      - "slurm/*.rpm"
  pull_request:
    paths:
      - "apps/jupyterhub/jupyterhub/**"
      - "deploy/core-production/kustomization.yaml"
      - "tests/e2e_hub/**"
      - ".github/workflows/e2e-hub.yml"
      - "docker/purdue-af-new/**"
      - "pixi/base/**"
      - "slurm/slurm-configs-hammer/**"
      - "slurm/*.rpm"
  schedule:
    - cron: "0 7 * * 1" # Mondays, after the Renovate window
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPO: ghcr.io/purdueaf/purdue-af
  # keep in sync with the FROM line in docker/purdue-af-new/Dockerfile
  GEDDES_BASE: geddes-registry.rcac.purdue.edu/docker-hub-cache/nvidia/cuda:12.4.1-devel-rockylinux8
  PUBLIC_BASE: docker.io/nvidia/cuda:12.4.1-devel-rockylinux8

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read # paths-filter diffs the PR
    outputs:
      image: ${{ steps.filter.outputs.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          # on schedule/workflow_dispatch this diffs against the default
          # branch → no changes → build skipped, e2e-prerelease revalidates
          # the currently promoted :pre-release tag
          filters: |
            image:
              - "docker/purdue-af-new/**"
              - "pixi/base/**"
              - "slurm/slurm-configs-hammer/**"
              - "slurm/*.rpm"
              - ".github/workflows/e2e-hub.yml"

  build-image:
    needs: changes
    if: needs.changes.outputs.image == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write # sha- tag push + registry build cache
    outputs:
      pushed: ${{ steps.push.outputs.pushed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@v1.3.1 # Renovate pins to digest
        with:
          tool-cache: true
          docker-images: false
      - name: Disk before build
        run: df -h / | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      # Login first: cache-from needs read; cache-to/push need write.
      - name: Login to ghcr.io
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4 # Renovate pins to digest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/purdue-af-new/Dockerfile
          tags: ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          # The Dockerfile's FROM points at the geddes docker-hub-cache proxy
          # (unreachable from GH runners); remap that exact ref to docker.io
          # without modifying the Dockerfile.
          build-contexts: |
            ${{ env.GEDDES_BASE }}=docker-image://${{ env.PUBLIC_BASE }}
          push: false
          load: true
          # Registry-backed cache — the 10 GB GHA cache cannot hold this
          # layer set. ignore-error keeps fork PRs (read-only token) building.
          cache-from: type=registry,ref=ghcr.io/purdueaf/purdue-af:buildcache
          cache-to: type=registry,ref=ghcr.io/purdueaf/purdue-af:buildcache,mode=max,ignore-error=true
      - name: Disk after build
        run: |
          df -h / | tee -a "$GITHUB_STEP_SUMMARY"
          docker image ls "$IMAGE_REPO" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Smoke test
        run: |
          docker run --rm "$IMAGE_REPO:sha-$GITHUB_SHA" sh -c '
            nvcc --version >/dev/null &&
            ps --version >/dev/null &&
            klist -V >/dev/null &&
            xz --version >/dev/null &&
            python3 -c "import jupyterlab; print(\"smoke ok:\", jupyterlab.__version__)"'
      # Mount the host CVMFS client into the image and source the CMS
      # environment — catches missing base utilities the CMS tooling needs
      # (image-level test; pod-level CVMFS CSI wiring is a cluster concern).
      - name: Install CVMFS on the runner
        uses: cvmfs-contrib/github-action-cvmfs@10197e000cc0add8e54ac4fb73d3ed44e2de72b4 # v5.5
      - name: CVMFS smoke test (cmsset_default.sh)
        run: |
          docker run --rm -v /cvmfs:/cvmfs:shared "$IMAGE_REPO:sha-$GITHUB_SHA" bash -c '
            source /cvmfs/cms.cern.ch/cmsset_default.sh &&
            command -v scramv1 >/dev/null &&
            echo "cmsset ok: $(command -v scramv1)"'
      # Only smoke-tested images ever reach the registry; the sha- tag is
      # immutable and what e2e-prerelease tests before promotion.
      - name: Push sha tag to ghcr.io
        id: push
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          docker push "$IMAGE_REPO:sha-$GITHUB_SHA"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
      - name: Size report (layer breakdown)
        if: steps.push.outputs.pushed == 'true'
        run: |
          {
            echo ""
            echo '```'
            python3 docker/kaniko-build-jobs/analyze_image_build.py --image "$IMAGE_REPO:sha-$GITHUB_SHA"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  e2e:
    # Production JH option: hub stack as deployed, lightweight stand-in image.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: tests/uv.lock
      - name: Install flux CLI
        uses: fluxcd/flux2/action@f61952f598f95dbc4c0af2cf470ec2857b750aae # main
        with:
          version: 2.5.1
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0 # Renovate pins to digest
        with:
          cluster_name: af-e2e
      - name: Deploy hub stack
        run: tests/e2e_hub/setup-kind.sh
      - name: Port-forward hub and mock
        run: |
          kubectl port-forward svc/proxy-public 8080:80 &
          kubectl port-forward svc/mock-cilogon 9090:9090 &
          sleep 3
      - name: Run e2e tests
        env:
          E2E_HUB: "1"
        run: uv run --project tests --frozen pytest -q -c tests/pyproject.toml tests/e2e_hub -v
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide
          kubectl get events --sort-by=.lastTimestamp | tail -40
          kubectl logs deployment/hub --tail=200 || true
          kubectl logs -l component=singleuser-server --tail=100 --prefix || true
          kubectl describe pods -l component=singleuser-server || true
          kubectl logs deployment/mock-cilogon --tail=50 || true

  e2e-prerelease:
    # Pre-release JH option: same hub stack, but spawns the REAL AF image —
    # the one built in THIS commit when the image inputs changed (needs:
    # guarantees ordering), else the currently promoted :pre-release tag.
    needs: [changes, build-image]
    if: ${{ !cancelled() && (needs.build-image.result == 'success' || needs.build-image.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read # pull the (possibly private) image into kind
    env:
      PRERELEASE_IMAGE: ${{ needs.build-image.outputs.pushed == 'true' && format('ghcr.io/purdueaf/purdue-af:sha-{0}', github.sha) || 'ghcr.io/purdueaf/purdue-af:pre-release' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: tests/uv.lock
      - name: Install flux CLI
        uses: fluxcd/flux2/action@f61952f598f95dbc4c0af2cf470ec2857b750aae # main
        with:
          version: 2.5.1
      - name: Free runner disk space # the AF image is ~13 GB uncompressed in kind
        uses: jlumbroso/free-disk-space@v1.3.1 # Renovate pins to digest
        with:
          tool-cache: true
          docker-images: false
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0 # Renovate pins to digest
        with:
          cluster_name: af-e2e
      - name: Deploy hub stack (with pre-release image preloaded)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tests/e2e_hub/setup-kind.sh
      - name: Port-forward hub and mock
        run: |
          kubectl port-forward svc/proxy-public 8080:80 &
          kubectl port-forward svc/mock-cilogon 9090:9090 &
          sleep 3
      - name: Run pre-release e2e test
        env:
          E2E_HUB: "1"
          E2E_PRERELEASE: "1"
        run: >-
          uv run --project tests --frozen pytest -q -c tests/pyproject.toml
          tests/e2e_hub -v -k "prerelease or hub_api_is_up"
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide
          kubectl get events --sort-by=.lastTimestamp | tail -40
          kubectl logs deployment/hub --tail=200 || true
          kubectl logs -l component=singleuser-server --tail=100 --prefix || true
          kubectl describe pods -l component=singleuser-server || true
          kubectl logs deployment/mock-cilogon --tail=50 || true

  promote:
    # Move the :pre-release tag to the digest that just passed e2e. The
    # hub's pre-release profile (image_pull_policy: Always) picks it up on
    # the next session spawn — no manifest edit needed.
    needs: [build-image, e2e-prerelease]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-image.outputs.pushed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4 # Renovate pins to digest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote sha tag to pre-release
        run: |
          docker buildx imagetools create \
            -t "$IMAGE_REPO:pre-release" \
            "$IMAGE_REPO:sha-$GITHUB_SHA"
          echo "promoted $IMAGE_REPO:sha-$GITHUB_SHA -> :pre-release" | tee -a "$GITHUB_STEP_SUMMARY"
