name: Lint YAML

on:
  push:
    paths:
      - "**.yml"
      - "**.yaml"
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check YAML formatting
        run: |
          git ls-files '*.yml' '*.yaml' \
            | grep -v '^docker/dask-gateway-server/' \
            | grep -v 'templates' \
            | grep -v '^\.github/workflows/' \
            | xargs npx --yes prettier@3.8.4 --check
