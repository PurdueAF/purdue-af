name: Release Aux Image

# Manual promotion for VERSIONED auxiliary images (e.g. af-node-monitor):
# retags a smoke-tested sha- build on ghcr with the next semver and
# rewrites every manifest reference under apps/ (also normalizing the pull
# path to the geddes ghcr-proxy-cache). The current version is read from
# the manifests themselves — nothing to remember.
#
# Continuous-channel images (agentic-interface, af-pod-monitor — the ones
# on :latest) are NOT released here: build-images.yml moves their ghcr
# :latest tag automatically after every smoke-tested main build, and
# bump-aux-image.py refuses to touch them.
#
# ⚠ Uses AF_RELEASE_TOKEN (fine-grained PAT, contents:write) if present —
# commits pushed with the default GITHUB_TOKEN do not trigger CI.

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Which versioned aux image to promote"
        type: choice
        options: [af-node-monitor]
      bump:
        description: "Semver bump"
        type: choice
        options: [patch, minor, major]
        default: patch
      source_tag:
        description: "ghcr tag to promote (default: the build of this commit)"
        default: ""

permissions:
  contents: write # manifest commit
  packages: write # semver tag on ghcr

concurrency:
  group: release-aux-image
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.AF_RELEASE_TOKEN || github.token }}
      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4 # Renovate pins to digest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump version in manifests
        id: ver
        run: |
          new=$(python3 .github/workflows/bump-aux-image.py \
            --name "${{ inputs.image }}" --bump "${{ inputs.bump }}" | tail -1)
          echo "version=$new" >> "$GITHUB_OUTPUT"
          git diff --stat
      - name: Tag the digest on ghcr (promote-by-digest, no rebuild)
        run: |
          repo="ghcr.io/purdueaf/${{ inputs.image }}"
          src="${{ inputs.source_tag }}"
          [ -n "$src" ] || src="sha-${{ github.sha }}"
          digest=$(docker buildx imagetools inspect "$repo:$src" --format '{{json .Manifest}}' | jq -r .digest)
          [ -n "$digest" ] || { echo "::error::cannot resolve $repo:$src — was this commit's build pushed?"; exit 1; }
          docker buildx imagetools create -t "$repo:${{ steps.ver.outputs.version }}" "$repo@$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "promoted $repo:$src ($digest) -> :${{ steps.ver.outputs.version }}" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Commit and push
        run: |
          git config user.name "af-release-bot"
          git config user.email "af-release-bot@users.noreply.github.com"
          git add apps/
          git commit -m "release ${{ inputs.image }} ${{ steps.ver.outputs.version }}"
          git push origin main
