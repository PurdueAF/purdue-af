name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agentic-interface:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/agentic-interface
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: docker/agentic-interface/uv.lock
      - name: Run tests
        run: uv run --frozen --group dev pytest -q
