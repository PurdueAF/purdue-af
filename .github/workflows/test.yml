name: Test

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write # Codecov OIDC upload (no token secret needed)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agentic-interface
            dir: docker/agentic-interface
            cov: --cov=.
          - name: jupyterhub-config
            dir: apps/jupyterhub/tests
            cov: --cov=../jupyterhub/extraFiles
          - name: exporters
            dir: tests/exporters
            cov: >-
              --cov=../../docker/af-pod-monitor
              --cov=../../docker/af-node-monitor
              --cov=../../apps/monitoring/af-monitoring
    name: ${{ matrix.name }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.dir }}/uv.lock
      - name: Run tests with coverage
        run: uv run --frozen --group dev pytest -q ${{ matrix.cov }} --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: ${{ matrix.name }}
          working-directory: ${{ matrix.dir }}
          use_oidc: true
          fail_ci_if_error: false
