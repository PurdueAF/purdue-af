name: Lint Python

on:
  push:
    paths:
      - "**.py"
  pull_request:
    paths:
      - "**.py"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install black==24.10.0 isort==5.13.2
      - name: Run black (check)
        run: git ls-files '*.py' | grep -v '^docker/dask-gateway-server/' | xargs black --check --diff
      - name: Run isort (check)
        run: git ls-files '*.py' | grep -v '^docker/dask-gateway-server/' | xargs isort --check-only --diff --profile black
