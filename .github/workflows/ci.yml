name: CI

# THE pipeline — the whole automatic CI/CD strategy as one dependency graph.
# Stages live in reusable workflows (ci-*.yml, this directory); publication
# is impossible without every stage of the SAME commit succeeding.
#
#   stage 0   checks      ci-checks.yml   lint · unit tests · manifest validation
#   stage 1a  pixi-base   ci-pixi-base.yml    sync/commit pixi/base lock +
#                                             import-smoke (before AF image —
#                                             Dockerfile uses `pixi install --locked`)
#   stage 1b  images      ci-images.yml       content-addressed builds: every image
#                                             is tagged in-<hash of its input tree>;
#                                             an existing tag is VERIFIED reuse
#   stage 1c  pixi-global ci-pixi-global.yml  sync/commit pixi/global lock +
#                                             import-smoke INSIDE the stage-1 AF image
#   stage 2   e2e         ci-e2e.yml      hub stack in kind, one job per channel:
#                                         e2e-production (spawns the image pinned
#                                         in values.yaml — the "e2e = production"
#                                         gate) and e2e-pre-release (spawns the
#                                         stage-1 AF image — always the current
#                                         repo state, never "whatever :pre-release
#                                         is")
#   stage 3   publish     (below)         main only, strictly behind the ci-ok gate:
#                                         :sha- provenance tags for every image,
#                                         aux continuous channel moves :latest,
#                                         AF image moves :pre-release,
#                                         refs/ci/main-passed (Flux experimental)
#
# ci-ok is the single branch-protection check: it fails if ANY stage did not
# succeed — a skipped-but-required job can never masquerade as a pass.
# Renovate PRs trigger this pipeline like any other PR (no weekly cron).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # never cancel a main run mid-publish; PR runs are superseded freely
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    uses: ./.github/workflows/ci-checks.yml
    permissions:
      contents: read
      id-token: write # Codecov OIDC upload

  # Lock sync + smoke for pixi/base BEFORE the AF image build so
  # `pixi install --locked` in the Dockerfile sees a matching lock.
  pixi-base:
    needs: checks
    uses: ./.github/workflows/ci-pixi-base.yml
    secrets:
      AF_RELEASE_TOKEN: ${{ secrets.AF_RELEASE_TOKEN }}
    permissions:
      contents: write # lockfile commits
      actions: write # workflow_dispatch when no PAT

  images:
    needs: pixi-base
    uses: ./.github/workflows/ci-images.yml
    permissions:
      contents: read
      packages: write # in- tag push + registry build cache

  pixi-global:
    needs: images
    uses: ./.github/workflows/ci-pixi-global.yml
    with:
      af-image: ${{ needs.images.outputs.af-image }}
      af-image-available: ${{ needs.images.outputs.af-image-available }}
    secrets:
      AF_RELEASE_TOKEN: ${{ secrets.AF_RELEASE_TOKEN }}
    permissions:
      contents: write # lockfile commits
      actions: write # workflow_dispatch when no PAT
      packages: read

  e2e:
    needs: images
    uses: ./.github/workflows/ci-e2e.yml
    with:
      af-image: ${{ needs.images.outputs.af-image }}
      af-image-available: ${{ needs.images.outputs.af-image-available }}
    permissions:
      contents: read
      packages: read

  ci-ok:
    # The one required status check. `if: always()` + explicit result
    # inspection: a failed OR skipped stage fails the gate — success is
    # never assumed for work that did not run.
    needs: [checks, pixi-base, images, pixi-global, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail unless every stage succeeded
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          echo "$RESULTS" | jq -e 'to_entries | all(.value.result == "success")' >/dev/null || {
            echo "::error::a required stage failed or was skipped — publication blocked"
            exit 1
          }

  publish:
    # Stage 3 — promote consumable channels. ONLY on push to main.
    # Never on pull_request, never on workflow_dispatch (including the
    # post-lock-commit dispatches on Renovate branches — those may build
    # and push content-addressed in-<hash> tags, but must not move
    # :latest / :pre-release / :sha- / refs/ci/main-passed).
    #
    # Pure retags of digests that just passed the full pipeline
    # (promote-by-digest, no rebuild):
    #   every image        → :sha-<commit>   (immutable provenance)
    #   aux images         → :latest         (continuous channel; manifests
    #                                          pull it via the geddes
    #                                          ghcr-proxy-cache on restart)
    #   purdue-af          → :pre-release    (the hub's pre-release profile,
    #                                          image_pull_policy Always)
    #   git                → refs/ci/main-passed  (Flux experimental source;
    #                                          custom ref, not a tag — avoids
    #                                          git push --tags collisions;
    #                                          GITHUB_TOKEN on purpose so the
    #                                          push does not retrigger CI)
    # Versioned promotion to production stays human: release-image.yml.
    needs: [ci-ok, images]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.ci-ok.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # refs/ci/main-passed
      packages: write
    steps:
      - name: Refuse to promote off main
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "push" ] || [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::refusing promote: only push to main may move" \
              " :latest / :pre-release / :sha- / refs/ci/main-passed" \
              " (got event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF})"
            exit 1
          fi
      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4 # Renovate pins to digest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Retags are BY DIGEST: what the pipeline tested is what ships, even
      # if a moving tag were overwritten between test and publish; and both
      # channel tags of an image always land on the same digest.
      - name: Publish aux images (:sha- + :latest)
        env:
          AUX_TAGS: ${{ needs.images.outputs.aux-tags }}
        run: |
          for pair in $AUX_TAGS; do
            name="${pair%%=*}"; tag="${pair#*=}"
            repo="ghcr.io/purdueaf/${name}"
            digest=$(docker buildx imagetools inspect "$repo:$tag" --format '{{json .Manifest}}' | jq -r .digest)
            [ -n "$digest" ] && [ "$digest" != "null" ] || { echo "::error::cannot resolve $repo:$tag"; exit 1; }
            docker buildx imagetools create \
              -t "$repo:sha-$GITHUB_SHA" \
              -t "$repo:latest" \
              "$repo@$digest"
            echo "published $repo@$digest ($tag) -> :sha-${GITHUB_SHA::12} + :latest" | tee -a "$GITHUB_STEP_SUMMARY"
          done
      - name: Publish AF image (:sha- + :pre-release)
        env:
          AF_IMAGE: ${{ needs.images.outputs.af-image }} # digest-pinned ref
          AF_DIGEST: ${{ needs.images.outputs.af-digest }}
        run: |
          repo="${AF_IMAGE%%:*}"
          docker buildx imagetools create \
            -t "$repo:sha-$GITHUB_SHA" \
            -t "$repo:pre-release" \
            "$repo@$AF_DIGEST"
          echo "published $repo@$AF_DIGEST -> :sha-${GITHUB_SHA::12} + :pre-release" | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Advance refs/ci/main-passed to this commit
        run: |
          set -euo pipefail
          git push --force origin "${GITHUB_SHA}:refs/ci/main-passed"
          echo "refs/ci/main-passed -> ${GITHUB_SHA}" | tee -a "$GITHUB_STEP_SUMMARY"
