name: CI checks

# Stage 0 of ci.yml — the quick gates (~5 min): every later stage (image
# builds, e2e, publication) waits for these, so time is never spent on
# expensive work while cheap problems exist.

on:
  workflow_call:

permissions:
  contents: read

env:
  FLUX_VERSION: 2.5.1
  KUBECONFORM_VERSION: v0.8.0
  PROMETHEUS_VERSION: 3.12.0 # for promtool

jobs:
  check-lint:
    # Runs every hook in .pre-commit-config.yaml (ruff, prettier, shfmt,
    # hadolint, hygiene). The config file is the single source of truth —
    # run the same thing locally with: uvx pre-commit run --all-files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install pre-commit
        run: pip install pre-commit==4.6.0
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color always

  check-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # Codecov OIDC upload (no token secret needed)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: tests/uv.lock
      # One project, one lock, every suite — run from the repo root so
      # coverage records repo-rooted paths (see .coveragerc).
      # bump_af_version is a load_script module name (file paths don't
      # work with --cov for non-package scripts).
      - name: Run tests with coverage
        run: >-
          uv run --project tests --frozen
          pytest -q -c tests/pyproject.toml tests
          --cov=docker/agentic-interface
          --cov=apps/jupyterhub/jupyterhub/extraFiles
          --cov=docker/af-pod-monitor
          --cov=docker/af-node-monitor
          --cov=apps/monitoring/af-monitoring
          --cov=apps/af-utils/af-users-graph
          --cov=docker/purdue-af/jupyter
          --cov=bump_af_version
          --cov-report=xml
      # Codecov reads filename attributes as-is (it ignores <source>), so
      # rewrite them to repo-rooted paths.
      - name: Normalise coverage paths
        run: python3 .github/workflows/fix-coverage-paths.py coverage.xml
      # Coverage reporting is informational: a Codecov outage (CLI download,
      # GPG keyserver, upload) must not fail the test job. Genuinely silent
      # processing rejections exit 0 regardless, so fail_ci_if_error would
      # not catch them anyway — staleness shows up on the badge/dashboard.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.xml
          use_oidc: true
          fail_ci_if_error: false

  check-manifests:
    # Builds every Flux-consumed kustomize root, applies each environment's
    # postBuild substitutions, and validates the rendered manifests with
    # kubeconform. Logic lives in validate-manifests.sh (this directory) —
    # run it locally.
    runs-on: ubuntu-latest # kustomize + yq preinstalled
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install flux CLI
        uses: fluxcd/flux2/action@c5902410cf258f55a66235fb4689e375ff3f8f59 # main
        with:
          version: ${{ env.FLUX_VERSION }}
      - name: Install kubeconform
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform
      - name: Install promtool
        run: |
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROMETHEUS_VERSION}/prometheus-${PROMETHEUS_VERSION}.linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 "prometheus-${PROMETHEUS_VERSION}.linux-amd64/promtool"
      - name: Validate manifests
        run: ./.github/workflows/validate-manifests.sh
