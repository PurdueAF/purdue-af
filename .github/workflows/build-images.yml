name: Build Images

# Build + smoke-test the lightweight (slim-base, ~1 min) first-party images
# on every push; on main, images that PASSED their smoke test are pushed to
# ghcr.io/purdueaf/<name>:sha-<commit> (see docker/REGISTRY.md for the
# registry architecture and the geddes pull-through cache).
#
# Large images (purdue-af, dask-gateway variants, interlink, servicex-science)
# are built only by the in-cluster kaniko jobs (docker/kaniko-build-jobs/) —
# they exceed GitHub-hosted runner time/disk limits. Pixi environments are
# validated in pixi-check.yml instead.

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write # ghcr push on main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agentic-interface
            dockerfile: docker/agentic-interface/Dockerfile
            context: .
            smoke: python -c "import server; print('ok:', server.SERVICE_PREFIX)"
          - name: af-pod-monitor
            dockerfile: docker/af-pod-monitor/Dockerfile
            context: docker/af-pod-monitor
            smoke: >-
              sh -c "cd /etc && python -c \"import importlib.util as u;
              s = u.spec_from_file_location('m', 'pod-metrics-exporter.py');
              m = u.module_from_spec(s); s.loader.exec_module(m);
              print('ok')\""
          - name: af-node-monitor
            dockerfile: docker/af-node-monitor/Dockerfile
            context: .
            smoke: >-
              sh -c "fio --version && cd /opt/af-node-monitor &&
              AF_NODE_MONITOR_VERBOSE=1 MOUNT_NAME=smoke CHECK_FILE=smoke
              python -c 'import job_runner, node_healthcheck; print(\"ok\")'"
    name: ${{ matrix.name }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ghcr.io/purdueaf/${{ matrix.name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          push: false
          load: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
      - name: Smoke test
        run: docker run --rm ghcr.io/purdueaf/${{ matrix.name }}:sha-${{ github.sha }} ${{ matrix.smoke }}
      # Only smoke-tested images ever reach the registry.
      - name: Login to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4 # Renovate pins to digest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ghcr.io/purdueaf/${{ matrix.name }}:sha-${{ github.sha }}
