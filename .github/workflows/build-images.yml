name: Build Images

# Build + smoke-test the lightweight (slim-base, ~1 min) first-party images
# on every push. This is the gate that catches breaking base-image bumps
# (FROM lines) before they reach the cluster.
#
# OS-scale images (dask-gateway variants) are built by
# build-images-heavy.yml on path changes + weekly. purdue-af and
# interlink-slurm-plugin are built only by in-cluster kaniko jobs;
# servicex-science-coffea needs a private-registry pull secret.
# All three are IMPROVEMENT_PLAN item 14 territory.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agentic-interface
            dockerfile: docker/agentic-interface/Dockerfile
            context: .
            smoke: python -c "import server; print('ok:', server.SERVICE_PREFIX)"
          - name: af-pod-monitor
            dockerfile: docker/af-pod-monitor/Dockerfile
            context: docker/af-pod-monitor
            smoke: >-
              sh -c "cd /etc && python -c \"import importlib.util as u;
              s = u.spec_from_file_location('m', 'pod-metrics-exporter.py');
              m = u.module_from_spec(s); s.loader.exec_module(m);
              print('ok')\""
          - name: af-node-monitor
            dockerfile: docker/af-node-monitor/Dockerfile
            context: .
            smoke: >-
              sh -c "fio --version && cd /opt/af-node-monitor &&
              AF_NODE_MONITOR_VERBOSE=1 MOUNT_NAME=smoke CHECK_FILE=smoke
              python -c 'import job_runner, node_healthcheck; print(\"ok\")'"
    name: ${{ matrix.name }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.name }}:ci
          push: false
          load: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
      - name: Smoke test
        run: docker run --rm ${{ matrix.name }}:ci ${{ matrix.smoke }}
