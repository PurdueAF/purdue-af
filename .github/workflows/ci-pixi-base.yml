name: CI pixi-base

# Stage 1a of ci.yml — BEFORE the AF image build so Dockerfile
# `pixi install --locked` sees a matching pixi/base lock.
#
#   1. `pixi install --locked` when toml/lock agree
#   2. otherwise `pixi lock` + install, then on green check-env commit the
#      regenerated lock back to the branch (Renovate only bumps manifests;
#      see skipArtifactsUpdate in renovate.json5)
#   3. import-smoke every direct dependency with pixi/check-env.py in an EL8
#      userland (rockylinux:8) — catches libstdc++ issues Ubuntu would miss.
#
# Memoized when the lock was already in sync (image-inputs.sh key). Lock
# commits prefer AF_RELEASE_TOKEN (PAT push re-triggers PR/push CI); without
# it we push with GITHUB_TOKEN and auto-approve the resulting action_required
# pull_request run (see retrigger-after-lock-push.sh) so no human click.
# Pixi pin: keep in sync with PIXI_VERSION in docker/purdue-af/Dockerfile
# and constraints.pixi in renovate.json5.

on:
  workflow_call:
    secrets:
      AF_RELEASE_TOKEN:
        description: "Optional PAT with contents:write — auto-retriggers CI on lock push"
        required: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # commit regenerated pixi/base/pixi.lock
      actions: write # workflow_dispatch when no PAT
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # PR head branch so a lock commit can be pushed back; main on push.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.AF_RELEASE_TOKEN || github.token }}
      - name: Compute memo key
        id: key
        run: echo "key=pixi-base-ok-$(./.github/workflows/image-inputs.sh pixi-base)" | tee -a "$GITHUB_OUTPUT"
      - name: Look up recorded green run
        id: memo
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .ci-memo
          key: ${{ steps.key.outputs.key }}
      - name: Verified reuse — identical input state already passed
        if: steps.memo.outputs.cache-hit == 'true'
        run: echo "skipping — ${{ steps.key.outputs.key }} already green" | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0 # Renovate pins to digest
        if: steps.memo.outputs.cache-hit != 'true'
        with:
          # Frozen at 0.62.2 (lock format v6) — do not bump; see renovate.json5.
          pixi-version: v0.62.2
          manifest-path: pixi/base/pixi.toml
          # environments requires run-install; we install in the next step so
          # we can regenerate the lock when toml/lock disagree.
          run-install: false
          cache: false
      - name: Install base env (regenerate lock if out of sync)
        id: lock
        if: steps.memo.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          MANIFEST=pixi/base/pixi.toml
          if pixi install --manifest-path "$MANIFEST" --environment base-env --locked; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::pixi/base lock out of sync — regenerating with pixi lock"
            pixi lock --manifest-path "$MANIFEST"
            pixi install --manifest-path "$MANIFEST" --environment base-env --locked
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Import-smoke the base env (EL8 container, like production)
        if: steps.memo.outputs.cache-hit != 'true'
        run: |
          docker run --rm -v "$PWD:$PWD" -w "$PWD" rockylinux:8 \
            pixi/base/.pixi/envs/base-env/bin/python pixi/check-env.py \
              --manifest pixi/base/pixi.toml --env base-env
      - name: Commit regenerated lockfile
        if: success() && steps.memo.outputs.cache-hit != 'true' && steps.lock.outputs.updated == 'true'
        env:
          HAVE_PAT: ${{ secrets.AF_RELEASE_TOKEN != '' }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          GH_TOKEN: ${{ secrets.AF_RELEASE_TOKEN || github.token }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::pixi/base/pixi.lock is out of sync with pixi.toml. " \
              "Fork PRs cannot receive lock commits — run \`pixi lock --manifest-path pixi/base/pixi.toml\` and push."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pixi/base/pixi.lock
          if git diff --staged --quiet; then
            echo "Lock regenerate produced no file change — nothing to commit"
            exit 0
          fi
          git commit -m "chore(pixi): regenerate base lockfile"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:$BRANCH"
          # Helper may be absent on Renovate branches — load from default branch.
          script=.github/workflows/retrigger-after-lock-push.sh
          if [ ! -f "$script" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/retrigger-after-lock-push.sh?ref=${GITHUB_DEFAULT_BRANCH}" \
              --jq .content | base64 -d > /tmp/retrigger-after-lock-push.sh
            script=/tmp/retrigger-after-lock-push.sh
            chmod +x "$script"
          fi
          "$script" "$HAVE_PAT" "$BRANCH" | tee -a "$GITHUB_STEP_SUMMARY"
          # Fail this SHA so images does not build against a pre-lock tree.
          # The follow-up run (concurrency) cancels this one.
          exit 1
      - name: Record green run
        # Only memoize in-sync trees; a lock push triggers a new commit/CI.
        if: success() && steps.memo.outputs.cache-hit != 'true' && steps.lock.outputs.updated != 'true'
        run: mkdir -p .ci-memo && echo ok > .ci-memo/marker
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        if: success() && steps.memo.outputs.cache-hit != 'true' && steps.lock.outputs.updated != 'true'
        with:
          path: .ci-memo
          key: ${{ steps.key.outputs.key }}
