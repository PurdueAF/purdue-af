name: CI e2e

# Stage 2 of ci.yml — the full JupyterHub stack in a throwaway kind
# cluster: the chart version from helmrelease.yaml, the real values.yaml,
# hub configmaps derived from the production kustomization, mock CILogon +
# mock LDAP. See tests/e2e_hub/README.md.
#
#   e2e-production   certifies the PRODUCTION deployment: the hub stack
#                    exactly as the repo deploys it to the cms namespace,
#                    spawning the REAL image pinned in values.yaml
#                    (singleuser.image.tag) — the "e2e = production" gate.
#                    Lightweight profiles still cover the fast hub-config
#                    tests; one profile spawns the pinned production image.
#   e2e-pre-release  certifies the PRE-RELEASE channel: same stack, but
#                    spawns the REAL AF image built in stage 1 for the
#                    CURRENT input state — never a previously promoted
#                    tag — through the hub's pre-release profile. The
#                    :pre-release promotion in ci.yml rides on this job.
#   cvmfs-smoke      image-level CVMFS check of the same AF image, in a
#                    parallel job so it stays off the critical path (it
#                    needs the host's /cvmfs, which the kind stack lacks).
#
# All jobs are memoized on the hash of their full input state
# (image-inputs.sh e2e-hub plus the AF image ref where it applies; the
# cvmfs-smoke key is the image ref alone): identical state with a
# recorded green run skips as verified reuse. The shared machinery
# (memo restore/save, image fallback, kind stack, diagnostics) lives in
# .github/actions/ composites — one definition, three consumers.
# Renovate chart bumps change helmrelease.yaml → the hash changes → e2e
# runs on the Renovate PR itself (this replaced the old weekly cron).

on:
  workflow_call:
    inputs:
      af-image:
        description: "Full ref of the AF image for the current input state"
        required: true
        type: string
      af-image-available:
        description: "'true' when af-image is pullable from ghcr"
        required: true
        type: string

permissions:
  contents: read

jobs:
  e2e-production:
    # Runs the full hub-config suite AND spawns the REAL image pinned for
    # production in values.yaml (the "e2e = production" gate). Heavy — it
    # pulls the ~13 GB AF image into kind — but memoized on the hub-config +
    # production-pin hash, so it only re-runs when either actually changes
    # (most commits touch neither and memo-hit).
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read # pull the production AF image into kind
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Resolve the production image
        id: image
        run: |
          name=$(yq '.singleuser.image.name' apps/jupyterhub/jupyterhub/values.yaml)
          tag=$(yq '.singleuser.image.tag' apps/jupyterhub/jupyterhub/values.yaml)
          # geddes ghcr-proxy-cache is unreachable from CI; the proxy mirrors
          # ghcr, so the ghcr ref resolves to the identical digest
          repo=${name/geddes-registry.rcac.purdue.edu\/ghcr-proxy-cache\//ghcr.io/}
          {
            echo "image=${repo}:${tag}"
            echo "tag=${tag}"
          } | tee -a "$GITHUB_OUTPUT"
      - name: Compute memo key
        id: key
        run: echo "key=e2e-production-ok-$(./.github/workflows/image-inputs.sh e2e-hub)-${{ steps.image.outputs.tag }}" | tee -a "$GITHUB_OUTPUT"
      - name: Look up recorded green run
        id: memo
        uses: ./.github/actions/e2e-memo-restore
        with:
          key: ${{ steps.key.outputs.key }}
      - name: Bring up the hub stack (production image preloaded)
        if: steps.memo.outputs.cache-hit != 'true'
        uses: ./.github/actions/kind-hub-stack
        env:
          PRELOAD_PRODUCTION: "1"
          PRODUCTION_IMAGE: ${{ steps.image.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          ghcr-login: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run e2e tests (hub config + production image)
        if: steps.memo.outputs.cache-hit != 'true'
        env:
          E2E_HUB: "1"
          E2E_PRODUCTION: "1"
          PRODUCTION_IMAGE: ${{ steps.image.outputs.image }}
        run: uv run --project tests --frozen pytest -q -c tests/pyproject.toml tests/e2e_hub -v
      - name: Diagnostics on failure
        if: failure()
        uses: ./.github/actions/hub-diagnostics
      - name: Record green run
        if: success() && steps.memo.outputs.cache-hit != 'true'
        uses: ./.github/actions/e2e-memo-save
        with:
          key: ${{ steps.key.outputs.key }}

  e2e-pre-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read # pull the (possibly private) image into kind
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Pick the AF image to spawn
        id: image
        uses: ./.github/actions/pick-af-image
        with:
          af-image: ${{ inputs.af-image }}
          af-image-available: ${{ inputs.af-image-available }}
      - name: Compute memo key
        id: key
        run: |
          img="${{ steps.image.outputs.image }}"
          echo "key=e2e-pre-release-ok-$(./.github/workflows/image-inputs.sh e2e-hub)-${img##*:}" | tee -a "$GITHUB_OUTPUT"
      - name: Look up recorded green run
        id: memo
        uses: ./.github/actions/e2e-memo-restore
        with:
          key: ${{ steps.key.outputs.key }}
      # setup-kind.sh crictl-pulls the image straight into the kind node —
      # measured ~3x faster than docker pull + kind load (which streams the
      # ~13 GB image uncompressed through a docker-save pipe). The CVMFS
      # check runs in the parallel cvmfs-smoke job below.
      - name: Bring up the hub stack (AF image preloaded)
        if: steps.memo.outputs.cache-hit != 'true'
        uses: ./.github/actions/kind-hub-stack
        env:
          PRERELEASE_IMAGE: ${{ steps.image.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run pre-release e2e test
        if: steps.memo.outputs.cache-hit != 'true'
        env:
          E2E_HUB: "1"
          E2E_PRERELEASE: "1"
          # the test asserts the spawned pod runs exactly this image
          PRERELEASE_IMAGE: ${{ steps.image.outputs.image }}
        run: >-
          uv run --project tests --frozen pytest -q -c tests/pyproject.toml
          tests/e2e_hub -v -k "prerelease or hub_api_is_up"
      - name: Diagnostics on failure
        if: failure()
        uses: ./.github/actions/hub-diagnostics
      - name: Record green run
        if: success() && steps.memo.outputs.cache-hit != 'true'
        uses: ./.github/actions/e2e-memo-save
        with:
          key: ${{ steps.key.outputs.key }}

  cvmfs-smoke:
    # Mount the host CVMFS client into the AF image and source the CMS
    # environment — catches missing base utilities the CMS tooling needs
    # (image-level test; pod-level CVMFS CSI wiring is a cluster concern).
    # A separate parallel job: the check pulls its own copy of the image,
    # which is cheaper than putting the pull + check on the e2e critical
    # path, and feeds ci-ok like every other job here.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read # pull the (possibly private) AF image
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Pick the AF image to test
        id: image
        uses: ./.github/actions/pick-af-image
        with:
          af-image: ${{ inputs.af-image }}
          af-image-available: ${{ inputs.af-image-available }}
      - name: Compute memo key
        id: key
        run: |
          img="${{ steps.image.outputs.image }}"
          echo "key=cvmfs-smoke-ok-${img##*:}" | tee -a "$GITHUB_OUTPUT"
      - name: Look up recorded green run
        id: memo
        uses: ./.github/actions/e2e-memo-restore
        with:
          key: ${{ steps.key.outputs.key }}
      - name: Login to ghcr.io
        if: steps.memo.outputs.cache-hit != 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4 # Renovate pins to digest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install CVMFS on the runner
        if: steps.memo.outputs.cache-hit != 'true'
        uses: cvmfs-contrib/github-action-cvmfs@10197e000cc0add8e54ac4fb73d3ed44e2de72b4 # v5.5
      - name: CVMFS smoke test (cmsset_default.sh)
        if: steps.memo.outputs.cache-hit != 'true'
        run: |
          docker run --rm -v /cvmfs:/cvmfs:shared "${{ steps.image.outputs.image }}" bash -c '
            source /cvmfs/cms.cern.ch/cmsset_default.sh &&
            command -v scramv1 >/dev/null &&
            echo "cmsset ok: $(command -v scramv1)"'
      - name: Record green run
        if: success() && steps.memo.outputs.cache-hit != 'true'
        uses: ./.github/actions/e2e-memo-save
        with:
          key: ${{ steps.key.outputs.key }}
