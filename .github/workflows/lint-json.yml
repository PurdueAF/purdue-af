name: Lint JSON

on:
  push:
    paths:
      - "**.json"
  pull_request:
    paths:
      - "**.json"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JSON formatting
        run: |
          git ls-files '*.json' \
            | grep -v '^docker/dask-gateway-server/' \
            | xargs npx --yes prettier@3.8.4 --check
