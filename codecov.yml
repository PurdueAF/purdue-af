# Codecov configuration.
# Statuses start informational: they report coverage without failing PRs.
# Tighten (informational: false + targets) once the baseline is established.

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Each CI suite uploads under its own flag; carryforward keeps a component's
# last-known coverage when a commit doesn't touch it.
flag_management:
  default_rules:
    carryforward: true

# Per-component coverage in the UI and PR comments.
component_management:
  individual_components:
    - component_id: agentic-interface
      name: Agentic interface (MCP server)
      paths: ["docker/agentic-interface/**"]
    - component_id: jupyterhub-config
      name: JupyterHub config snippets
      paths: ["apps/jupyterhub/jupyterhub/extraFiles/**"]
    - component_id: exporters
      name: Monitoring exporters
      paths:
        - "docker/af-pod-monitor/**"
        - "docker/af-node-monitor/**"
        - "apps/monitoring/af-monitoring/**"
    - component_id: scripts
      name: Standalone scripts
      paths:
        - "apps/af-utils/af-users-graph/**"
        - "docker/purdue-af/jupyter/**"

# One concise PR comment, updated in place.
comment:
  layout: "condensed_header, diff, flags, components"
  behavior: default
  require_changes: false

ignore:
  - "tests/**"
  - "**/tests/**"
  - "docker/dask-gateway-server/**" # vendored fork
  - "docs/**"
