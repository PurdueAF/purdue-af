apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: purdue-af-experimental
  namespace: cms
  annotations:
    cluster: geddes
spec:
  interval: 30s
  timeout: 1m
  url: https://github.com/PurdueAF/purdue-af.git
  ref:
    # CI-owned moving branch: advanced in the ci.yml publish stage behind
    # ci-ok. Near tip of main; visible in the GitHub Branches UI. Not
    # included in `git push --tags`.
    branch: main-validated
  secretRef:
    name: flux-github-token
