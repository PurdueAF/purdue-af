apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: purdue-af-experimental
  namespace: cms
  annotations:
    cluster: geddes
spec:
  interval: 30s
  timeout: 1m
  url: https://github.com/PurdueAF/purdue-af.git
  ref:
    # CI-owned moving tag: advanced in the ci.yml publish stage (behind
    # ci-ok). Near tip of main, not the tip itself.
    tag: main-ci-passed
  secretRef:
    name: flux-github-token
