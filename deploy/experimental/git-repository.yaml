apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: purdue-af-experimental
  namespace: cms
  annotations:
    cluster: geddes
spec:
  interval: 30s
  timeout: 1m
  url: https://github.com/PurdueAF/purdue-af.git
  ref:
    # CI-owned moving tag: advanced to HEAD of main only after ci-ok
    # (see .github/workflows/ci.yml). Not the tip of main itself.
    tag: main-ci-passed
  secretRef:
    name: flux-github-token
