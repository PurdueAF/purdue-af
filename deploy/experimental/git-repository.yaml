apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: purdue-af-experimental
  namespace: cms
  annotations:
    cluster: geddes
spec:
  interval: 30s
  timeout: 1m
  url: https://github.com/PurdueAF/purdue-af.git
  ref:
    # CI-owned custom ref (not a tag): advanced in the ci.yml publish
    # stage behind ci-ok. Near tip of main; not fetched by default
    # `git fetch` / `git push --tags`, so it cannot collide with local tags.
    name: refs/ci/main-passed
  secretRef:
    name: flux-github-token
