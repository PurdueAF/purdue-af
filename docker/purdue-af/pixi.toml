[workspace]
name = "base-env"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
# Core runtime
python        = "3.10.*"
conda         = "==26.3.2"
mamba         = "==2.5.0"
jupyter_core  = "*"
jupyter       = "*"
code-server   = "==4.115.0"
jupyter-vscode-proxy = "*"
jupyter-server-proxy = "*"

# Jupyter pieces
notebook      = "*"
jupyterhub    = "*"
jupyterlab    = "==4.5.6"
nodejs        = "22.*"

# Kernel discovery / misc
nb_conda_kernels      = "*"
metakernel            = "*"
importlib-metadata    = "<8.8"   # opentelemetry-api requires <8.8.0

# Other tools
rucio-clients = "*"
pytest        = "*"
lz4           = "*"
ipywidgets    = "*"
ipympl        = "*"
bokeh         = "==3.9.0"
openssh       = "*"
uv            = "*"

[pypi-dependencies]
jupyterlab-git            = "==0.52.0"
jupyter-resource-usage    = "==1.2.1"
jupyterlab_iframe         = "==0.5.0"
jupyter-archive           = "==3.4.0"
jupyterlab_favorites      = "==3.5.0"
purdue-af-shutdown-button = "==0.1.0"
jupyterlab-topbar-text    = "==1.1.0"
jupyterlab-theme-toggler  = "==1.1.0"
dask-gateway              = "==2026.3.0"
pyroscope-io              = "==1.0.5"
opentelemetry-api                      = ">=1.0"
opentelemetry-sdk                      = ">=1.0"
opentelemetry-exporter-otlp-proto-http = ">=1.0"
opentelemetry-instrumentation-requests = ">=0.40b0"
opentelemetry-instrumentation-urllib3  = ">=0.40b0"
jupyter-sshd-proxy        = "==0.3.0"
pixi-kernel               = "==0.7.1"

[environments]
base-env = { features = [] }
