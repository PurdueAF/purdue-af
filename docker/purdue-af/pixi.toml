[workspace]
name = "base-env"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
# Core runtime
python        = "3.10.*"
conda         = "==26.3.2"
mamba         = "==2.5.0"
jupyter_core  = "==5.9.1"
jupyter       = "==1.1.1"
code-server   = "==4.115.0"
jupyter-vscode-proxy = "==0.7"
jupyter-server-proxy = "==4.5.0"

# Jupyter pieces
jupyter_server = "==2.16.0"
notebook      = "==7.5.5"
jupyterhub    = "==5.4.4"
jupyterlab    = "==4.5.6"
ipyparallel   = "==9.1.0"
nodejs        = "22.*"

# Kernel discovery / misc
nb_conda_kernels      = "==2.5.1"
metakernel            = "==0.32.0"
importlib-metadata    = "<8.8"   # opentelemetry-api requires <8.8.0

# Other tools
rucio-clients = "==39.3.1"
pytest        = "==9.0.3"
lz4           = "==4.4.5"
ipywidgets    = "==8.1.8"
ipympl        = "==0.10.0"
bokeh         = "==3.9.0"
openssh       = "==9.8p1"
uv            = "==0.11.7"

[pypi-dependencies]
jupyterlab-git            = "==0.52.0"
jupyter-resource-usage    = "==1.2.1"
jupyterlab_iframe         = "==0.5.0"
jupyter-archive           = "==3.4.0"
jupyterlab_favorites      = "==3.5.0"
purdue-af-shutdown-button = "==0.1.0"
jupyterlab-topbar-text    = "==1.1.0"
jupyterlab-theme-toggler  = "==1.1.0"
dask-gateway              = "==2026.3.0"
pyroscope-io              = "==1.0.6"
opentelemetry-api                      = "==1.41.1"
opentelemetry-sdk                      = "==1.41.1"
opentelemetry-exporter-otlp-proto-http = "==1.41.1"
opentelemetry-instrumentation-requests = "==0.62b1"
opentelemetry-instrumentation-urllib3  = "==0.62b1"
jupyter-sshd-proxy        = "==0.3.0"
pixi-kernel               = "==0.7.1"

[environments]
base-env = { features = [] }
