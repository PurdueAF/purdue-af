app:
  image: geddes-registry.rcac.purdue.edu/docker-hub-cache/sslhep/servicex_app
  tag: "v1.8.3"
  checksImage: geddes-registry.rcac.purdue.edu/docker-hub-cache/ncsa/checks:main
  allowedImagePrefixes:
    - "geddes-registry.rcac.purdue.edu/docker-hub-cache/"
    - "geddes-registry.rcac.purdue.edu/cms/"
    - "docker.io/sslhep"
    - "sslhep/"
    - "gitlab-registry.cern.ch/"
  resources:
    requests:
      cpu: 2
      memory: 2Gi
    limits:
      cpu: 4
      memory: 4Gi
  ingress:
    enabled: false
    class: public
    host: geddes.rcac.purdue.edu
  nodeSelector:
    cms-af-prod: "true"
  tolerations:
    - key: "hub.jupyter.org/dedicated"
      operator: "Equal"
      value: "cms-af"
      effect: "NoSchedule"
noCerts: false
postgres:
  enabled: true
postgresql:
  image:
    registry: geddes-registry.rcac.purdue.edu
    repository: docker-hub-cache/bitnamilegacy/postgresql
    tag: 14.5.0-debian-11-r35
  # global:
  #   postgresql:
  #     auth:
  #       database: servicex
  #       postgresPassword: leftfoot1
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    persistence:
      enabled: false
      storageClass: ${multinode_storage_class}
      accessModes: [ReadWriteMany]
    nodeSelector:
      cms-af-prod: "true"
    tolerations:
      - key: "hub.jupyter.org/dedicated"
        operator: "Equal"
        value: "cms-af"
        effect: "NoSchedule"

objectStore:
  enabled: true
  internal: false
  publicURL: s3.anvil.rcac.purdue.edu:443
  useTLS: true

codeGen:
  uproot-raw:
    enabled: true
    image: geddes-registry.rcac.purdue.edu/docker-hub-cache/sslhep/servicex_code_gen_raw_uproot
    tag: "v1.8.3"
    defaultScienceContainerImage: geddes-registry.rcac.purdue.edu/docker-hub-cache/sslhep/servicex_science_image_combined_root
    defaultScienceContainerTag: 5.7.2-6.38.04
    compressionAlgorithm: ZSTD
    compressionLevel: 0
    nodeSelector:
      cms-af-prod: "true"
    tolerations:
      - key: "hub.jupyter.org/dedicated"
        operator: "Equal"
        value: "cms-af"
        effect: "NoSchedule"
  rdataframe:
    enabled: false
  uproot:
    enabled: false
  python:
    enabled: true
    image: geddes-registry.rcac.purdue.edu/docker-hub-cache/sslhep/servicex_code_gen_python
    tag: python-codegen-compression #"v1.8.3"
    defaultScienceContainerImage: geddes-registry.rcac.purdue.edu/cms/servicex-science-combined-root-coffea
    defaultScienceContainerTag: 5.7.2-6.38.04
    compressionAlgorithm: ZSTD
    compressionLevel: 0
    nodeSelector:
      cms-af-prod: "true"
    tolerations:
      - key: "hub.jupyter.org/dedicated"
        operator: "Equal"
        value: "cms-af"
        effect: "NoSchedule"
  atlasr21:
    enabled: false
  atlasr22:
    enabled: false
  atlasr25:
    enabled: false
  topcp:
    enabled: false
  cmssw-5-3-32:
    enabled: false

transformer:
  sidecarImage: geddes-registry.rcac.purdue.edu/docker-hub-cache/sslhep/servicex_sidecar_transformer
  sidecarTag: "v1.8.3"
  autoscaler:
    maxReplicas: 500
  cpuRequest: 500m
  memoryRequest: 2Gi
  cpuLimit: 1
  memoryLimit: 4Gi
  # persistence:
  #   existingClaim: "claim-dkondra"
  #   subdir: /servicex/
  # cachePrefix: "'xcache.cms.rcac.purdue.edu'"
  nodeSelector:
    cms-af-prod: "true"
  tolerations:
    - key: "hub.jupyter.org/dedicated"
      operator: "Equal"
      value: "cms-af"
      effect: "NoSchedule"

rabbitmq:
  image:
    registry: geddes-registry.rcac.purdue.edu
    repository: docker-hub-cache/bitnamilegacy/rabbitmq
    tag: 3.11.18-debian-11-r0
  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      cpu: 1
      memory: 1Gi
  nodeSelector:
    cms-af-prod: "true"
  tolerations:
    - key: "hub.jupyter.org/dedicated"
      operator: "Equal"
      value: "cms-af"
      effect: "NoSchedule"
minio:
  enabled: false
  persistence:
    enabled: false
    storageClass: ${multinode_storage_class}
    accessModes: [ReadWriteMany]
    size: 10Gi
  service:
    ports:
      api: 9000
  ingress:
    enabled: false
    hostname: servicex-anvil-minio.geddes.rcac.purdue.edu
    ingressClassName: public
  apiIngress:
    enabled: false
    hostname: "servicex-anvil-minio-api.geddes.rcac.purdue.edu"
    ingressClassName: public
  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      cpu: 1
      memory: 1Gi
  nodeSelector:
    cms-af-prod: "true"
  tolerations:
    - key: "hub.jupyter.org/dedicated"
      operator: "Equal"
      value: "cms-af"
      effect: "NoSchedule"

minioCleanup:
  enabled: true
didFinder:
  rucio:
    enabled: false
    rucio_host: http://cms-rucio.cern.ch
    auth_host: https://cms-rucio-auth.cern.ch
    nodeSelector:
      cms-af-prod: "true"
    tolerations:
      - key: "hub.jupyter.org/dedicated"
        operator: "Equal"
        value: "cms-af"
        effect: "NoSchedule"
  xrootd:
    enabled: true
    image: geddes-registry.rcac.purdue.edu/docker-hub-cache/sslhep/servicex-did-finder-xrootd
    tag: "v1.8.3"
    nodeSelector:
      cms-af-prod: "true"
    tolerations:
      - key: "hub.jupyter.org/dedicated"
        operator: "Equal"
        value: "cms-af"
        effect: "NoSchedule"
  CERNOpenData:
    enabled: false
  atlasopenmagic:
    enabled: false
gridAccount: dkondrat
x509Secrets:
  image: geddes-registry.rcac.purdue.edu/docker-hub-cache/sslhep/x509-secrets
  tag: "v1.8.4"
  initImage: geddes-registry.rcac.purdue.edu/docker-hub-cache/library/alpine:3.6
  pullPolicy: Always
  vomsOrg: cms
  nodeSelector:
    cms-af-prod: "true"
  tolerations:
    - key: "hub.jupyter.org/dedicated"
      operator: "Equal"
      value: "cms-af"
      effect: "NoSchedule"

scheduledTasks:
  image: geddes-registry.rcac.purdue.edu/docker-hub-cache/library/python
  tag: "3.10"

secrets: servicex-secrets-anvil