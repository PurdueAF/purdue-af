# Read-only Kubernetes API access for kagent agent pods (namespace-local).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kagent-agent-readonly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kagent-agent-readonly
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kagent.dev"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kagent-agent-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kagent-agent-readonly
subjects:
  - kind: ServiceAccount
    name: kagent-agent-readonly
