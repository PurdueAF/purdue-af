# Extra ModelConfigs for GenAI Studio (OpenAI-compatible). Same endpoint/secret as default-model-config.
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: gemma3-27b
  labels:
    purdue-af/component: kagent
spec:
  provider: OpenAI
  model: gemma3:27b
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  openAI:
    baseUrl: https://genai.rcac.purdue.edu/api
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: llama33-70b
  labels:
    purdue-af/component: kagent
spec:
  provider: OpenAI
  model: llama3.3:70b
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  openAI:
    baseUrl: https://genai.rcac.purdue.edu/api
