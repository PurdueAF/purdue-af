# Namespace UX: controller.watchNamespaces limits the UI namespace list to this env only.
# apps/kagent/controller-namespace-cluster-rbac.yaml grants Get on that Namespace (required
# for /api/namespaces). The create-agent form still initializes to "default" in upstream UI;
# choose your release namespace from the combobox (only that namespace is listed once the API succeeds).
fullnameOverride: kagent-cms

# Pin runtime image tags to the chart version so the controller and agent Deployments
# do not oscillate between stale agent images (e.g. 0.7.x) and IMAGE_TAG from the chart.
tag: "0.8.6"

providers:
  default: openAI
  openAI:
    provider: OpenAI
    model: gemma3:27b
    apiKeySecretRef: kagent-openai
    apiKeySecretKey: OPENAI_API_KEY
    config:
      baseUrl: https://genai.rcac.purdue.edu/api

rbac:
  clusterScoped: false

database:
  postgres:
    bundled:
      storageClassName: ${singlenode_storage_class}
      image:
        registry: geddes-registry.rcac.purdue.edu
        repository: docker-hub-cache/library
        name: postgres
        tag: "18"

controller:
  watchNamespaces:
    - ${namespace}
    - cms
  agentImage:
    tag: "0.8.6"
  agentDeployment:
    serviceAccountName: kagent-agent-readonly
  env:
    - name: OPENAI_API_BASE
      value: https://genai.rcac.purdue.edu/api

kagent-tools:
  nameOverride: tools-cms
kmcp:
  nameOverride: kmcp-cms

tools:
  grafana-mcp:
    enabled: true
  querydoc:
    enabled: false

grafana-mcp:
  grafana:
    url: http://grafana.${namespace}.svc.cluster.local/grafana
    secretRef: kagent-grafana-mcp-token
  config:
    GRAFANA_ORG_ID: "1"
  image:
    registry: geddes-registry.rcac.purdue.edu
    repository: docker-hub-cache/mcp/grafana
    tag: latest
    pullPolicy: IfNotPresent

agents:
  helm-agent:
    enabled: false
  istio-agent:
    enabled: false
  argo-rollouts-agent:
    enabled: false
  kgateway-agent:
    enabled: false
  cilium-policy-agent:
    enabled: false
  cilium-manager-agent:
    enabled: false
  cilium-debug-agent:
    enabled: false
  k8s-agent:
    enabled: false
  observability-agent:
    enabled: false
  promql-agent:
    enabled: false
