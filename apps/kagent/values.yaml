providers:
  default: openAI
  openAI:
    provider: OpenAI
    model: gpt-oss:latest
    apiKeySecretRef: kagent-openai
    apiKeySecretKey: OPENAI_API_KEY
    config:
      baseUrl: https://genai.rcac.purdue.edu/api

rbac:
  clusterScoped: false

database:
  postgres:
    bundled:
      storageClassName: ${singlenode_storage_class}
      image:
        registry: geddes-registry.rcac.purdue.edu
        repository: docker-hub-cache/library
        name: postgres
        tag: "18"

controller:
  watchNamespaces:
    - ${namespace}
  agentDeployment:
    serviceAccountName: kagent-agent-readonly
  env:
    - name: OPENAI_API_BASE
      value: https://genai.rcac.purdue.edu/api

tools:
  grafana-mcp:
    enabled: false
  querydoc:
    enabled: false

agents:
  helm-agent:
    enabled: false
  istio-agent:
    enabled: false
  argo-rollouts-agent:
    enabled: false
  kgateway-agent:
    enabled: false
  cilium-policy-agent:
    enabled: false
  cilium-manager-agent:
    enabled: false
  cilium-debug-agent:
    enabled: false
