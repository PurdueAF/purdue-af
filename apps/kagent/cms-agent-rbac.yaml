# SA used by agent pods running in the cms namespace.
# Must match controller.agentDeployment.serviceAccountName in values.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kagent-agent-readonly
  namespace: cms
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kagent-agent-readonly
  namespace: cms
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kagent.dev"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kagent-agent-readonly
  namespace: cms
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kagent-agent-readonly
subjects:
  - kind: ServiceAccount
    name: kagent-agent-readonly
    namespace: cms
