# The controller's /api/namespaces handler uses Namespace Get (cluster-scoped). Namespace-scoped
# Roles from the chart do not grant that, so the UI stays on "Loading namespaces".
# This ClusterRole allows only the watched namespace object (see controller.watchNamespaces).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kagent-purdue-af-controller-namespace-get-${namespace}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    resourceNames: ["${namespace}"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kagent-purdue-af-controller-namespace-get-${namespace}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kagent-purdue-af-controller-namespace-get-${namespace}
subjects:
  - kind: ServiceAccount
    name: kagent-controller
    namespace: ${namespace}
