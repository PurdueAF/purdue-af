apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2rchi-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2rchi-chatbot
  template:
    metadata:
      labels:
        app: a2rchi-chatbot
    spec:
      containers:
        - name: chatbot
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "/opt/A2rchi/src/bin/service_chat.py"]
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: PG_PASSWORD_FILE
              value: /secrets/pg_password
            - name: OPENAI_API_KEY_FILE
              value: /secrets/openai_api_key
            - name: ANTHROPIC_API_KEY_FILE
              value: /secrets/anthropic_api_key
            - name: HUGGING_FACE_HUB_TOKEN_FILE
              value: /secrets/huggingface_token
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: a2rchi-prompts
              mountPath: /root/A2rchi
              readOnly: true
            - name: configs-dir
              mountPath: /root/A2rchi/configs
            - name: a2rchi-config
              mountPath: /root/A2rchi/configs/purdue-af.yaml
              subPath: purdue-af.yaml
              readOnly: true
            - name: secrets
              mountPath: /secrets
      volumes:
        - name: a2rchi-prompts
          configMap:
            name: a2rchi-config
            items:
              - key: main.prompt
                path: main.prompt
              - key: condense.prompt
                path: condense.prompt
              - key: summary.prompt
                path: summary.prompt
        - name: a2rchi-config
          configMap:
            name: a2rchi-config
            items:
              - key: purdue-af.yaml
                path: purdue-af.yaml
        - name: configs-dir
          emptyDir: {}
        - name: secrets
          projected:
            sources:
              - secret:
                  name: a2rchi-postgres
                  items:
                    - key: POSTGRES_PASSWORD
                      path: pg_password
              - secret:
                  name: {{ .Values.envSecret.name }}
                  optional: true
                  items:
                    - key: OPENAI_API_KEY
                      path: openai_api_key
                    - key: ANTHROPIC_API_KEY
                      path: anthropic_api_key
                    - key: HUGGINGFACEHUB_API_TOKEN
                      path: huggingface_token
---
apiVersion: v1
kind: Service
metadata:
  name: a2rchi
spec:
  selector:
    app: a2rchi-chatbot
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}

