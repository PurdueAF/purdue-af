apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2rchi-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2rchi-chatbot
  template:
    metadata:
      labels:
        app: a2rchi-chatbot
    spec:
      initContainers:
        - name: install-a2rchi
          image: python:3.11-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Installing system dependencies..."
              apt-get update && apt-get install -y --no-install-recommends \
                git curl ca-certificates build-essential cmake gcc g++ python3-dev \
                && rm -rf /var/lib/apt/lists/*
              
              echo "Upgrading pip..."
              python -m pip install --upgrade pip
              
              echo "Cloning A2RCHI repository..."
              git clone https://github.com/mit-submit/A2rchi.git /opt/A2rchi
              
              echo "Installing A2RCHI dependencies into shared prefix /opt/a2rchi/python..."
              mkdir -p /opt/a2rchi/python
              PIP_PREFIX=/opt/a2rchi/python
              pip install --prefix ${PIP_PREFIX} -r /opt/A2rchi/requirements/requirements-base.txt
              pip install --prefix ${PIP_PREFIX} -r /opt/A2rchi/requirements/cpu-requirementsHEADER.txt
              
              echo "Installing A2RCHI (editable) into shared prefix..."
              pip install --prefix ${PIP_PREFIX} -e /opt/A2rchi
              
              echo "A2RCHI installation completed!"
          volumeMounts:
            - name: a2rchi-install
              mountPath: /opt
          resources:
            requests:
              cpu: "4"
              memory: "4Gi"
            limits:
              cpu: "8"
              memory: "8Gi"
      containers:
        - name: chatbot
          image: python:3.11-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Starting A2RCHI chatbot service..."
              export PYTHONPATH=/opt/A2rchi:${PYTHONPATH}
              # Use shared prefix installed packages
              export PATH=/opt/a2rchi/python/bin:${PATH}
              export PYTHONPATH=/opt/a2rchi/python/lib/python3.11/site-packages:${PYTHONPATH}
              exec python /opt/A2rchi/src/bin/service_chat.py
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: PG_PASSWORD_FILE
              value: /secrets/pg_password
            {{- if .Values.model.huggingface.secretName }}
            - name: HUGGINGFACEHUB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.huggingface.secretName }}
                  key: HUGGINGFACEHUB_API_TOKEN
            - name: HUGGINGFACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.huggingface.secretName }}
                  key: HUGGINGFACEHUB_API_TOKEN
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.huggingface.secretName }}
                  key: HUGGINGFACEHUB_API_TOKEN
            {{- end }}
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: postgres
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: a2rchi-install
              mountPath: /opt
            - name: a2rchi-prompts
              mountPath: /root/A2rchi
              readOnly: true
            - name: configs-dir
              mountPath: /root/A2rchi/configs
            - name: a2rchi-config
              mountPath: /root/A2rchi/configs/purdue-af.yaml
              subPath: purdue-af.yaml
              readOnly: true
            - name: a2rchi-data
              mountPath: /root/A2rchi/data
            - name: secrets
              mountPath: /secrets
      volumes:
        - name: a2rchi-install
          emptyDir: {}
        - name: a2rchi-prompts
          configMap:
            name: a2rchi-config
            items:
              - key: main.prompt
                path: main.prompt
              - key: condense.prompt
                path: condense.prompt
        - name: a2rchi-config
          configMap:
            name: a2rchi-config
            items:
              - key: purdue-af.yaml
                path: purdue-af.yaml
        - name: configs-dir
          emptyDir: {}
        - name: a2rchi-data
          emptyDir: {}
        - name: secrets
          projected:
            sources:
              - secret:
                  name: a2rchi-postgres
                  items:
                    - key: POSTGRES_PASSWORD
                      path: pg_password
---
apiVersion: v1
kind: Service
metadata:
  name: a2rchi
spec:
  selector:
    app: a2rchi-chatbot
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}

