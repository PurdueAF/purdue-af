apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2rchi-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2rchi-chatbot
  template:
    metadata:
      labels:
        app: a2rchi-chatbot
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /root/A2rchi/configs && ls -la /root/A2rchi && ls -la /root/A2rchi/configs || true"]
          volumeMounts:
            - name: config
              mountPath: /root/A2rchi
      containers:
        - name: chatbot
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "/opt/A2rchi/src/bin/service_chat.py"]
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: PG_PASSWORD_FILE
              value: /secrets/pg_password
            - name: OPENAI_API_KEY_FILE
              value: /secrets/openai_api_key
            - name: ANTHROPIC_API_KEY_FILE
              value: /secrets/anthropic_api_key
            - name: HUGGING_FACE_HUB_TOKEN_FILE
              value: /secrets/huggingface_token
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /root/A2rchi
            - name: secrets
              mountPath: /secrets
      volumes:
        - name: config
          configMap:
            name: a2rchi-config
        - name: secrets
          projected:
            sources:
              - secret:
                  name: a2rchi-postgres
                  items:
                    - key: POSTGRES_PASSWORD
                      path: pg_password
              - secret:
                  name: {{ .Values.envSecret.name }}
                  optional: true
                  items:
                    - key: OPENAI_API_KEY
                      path: openai_api_key
                    - key: ANTHROPIC_API_KEY
                      path: anthropic_api_key
                    - key: HUGGINGFACEHUB_API_TOKEN
                      path: huggingface_token
---
apiVersion: v1
kind: Service
metadata:
  name: a2rchi
spec:
  selector:
    app: a2rchi-chatbot
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}

