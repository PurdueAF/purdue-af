apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: a2rchi
spec:
  suspend: false
  interval: 1m
  chart:
    spec:
      chart: apps/a2rchi/helm/a2rchi
      sourceRef:
        kind: GitRepository
        name: purdue-af-experimental
      interval: 1m
  install:
    timeout: 30m0s
    remediation:
      retries: -1
  upgrade:
    timeout: 30m0s
    remediation:
      retries: -1
  values:
    ingress:
      enabled: ${enable_ingresses}
      class: public
      host: a2rchi.geddes.rcac.purdue.edu
    image:
      repository: geddes-registry.rcac.purdue.edu/cms/a2rchi
      tag: latest
      pullPolicy: IfNotPresent
    model:
      backend: openai
      openai:
        model: gpt-oss:latest
        baseUrl: "https://genai.rcac.purdue.edu/api"
        secretName: "a2rchi-openai-token"
    postgres:
      enabled: true
      persistence:
        enabled: false
        storageClass: ${multinode_storage_class}
    chromadb:
      enabled: true
      persistence:
        enabled: false
        storageClass: ${multinode_storage_class}
    envSecret:
      create: false
      name: a2rchi-secrets
