apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: thanos
spec:
  interval: 1m
  chart:
    spec:
      chart: thanos
      version: "1.23.0"
      sourceRef:
        kind: HelmRepository
        name: stevehipwell
      interval: 1m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  valuesFrom:
    - kind: ConfigMap
      name: thanos-config
      valuesKey: values.yaml
