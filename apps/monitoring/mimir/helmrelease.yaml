apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: mimir
spec:
  interval: 1m
  chart:
    spec:
      chart: mimir-distributed
      version: "6.0.5"
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 1m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  valuesFrom:
    - kind: ConfigMap
      name: mimir-config
      valuesKey: values.yaml
  # Patch gateway image to use Geddes registry mirror (chart doesn't expose registry key)
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: mimir-gateway
              spec:
                template:
                  spec:
                    containers:
                      - name: gateway
                        image: geddes-registry.rcac.purdue.edu/docker-hub-cache/nginxinc/nginx-unprivileged:1.29-alpine
            target:
              kind: Deployment
              name: mimir-gateway
