apiVersion: apps/v1
kind: Deployment
metadata:
  name: af-node-monitor
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      name: af-node-monitor
  template:
    metadata:
      labels:
        name: af-node-monitor
    spec:
      serviceAccountName: af-node-monitor
      enableServiceLinks: false
      containers:
        - name: af-node-monitor
          # continuous channel: ci.yml moves :latest after every fully green
          # main pipeline; k8s pulls :latest with policy Always by default
          image: geddes-registry.rcac.purdue.edu/ghcr-proxy-cache/purdueaf/af-node-monitor:latest
          command: ["python", "/scripts/node_healthcheck.py"]
          env:
            - name: RESULTS_DIR
              value: "/af-node-monitor/results"
            - name: AF_NODE_MONITOR_VERBOSE
              value: "false"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8000
              name: metrics
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: af-node-monitor-storage
              mountPath: /af-node-monitor
      volumes:
        - name: scripts
          configMap:
            name: af-node-monitor-config
        - name: af-node-monitor-storage
          persistentVolumeClaim:
            claimName: af-node-monitor-storage
