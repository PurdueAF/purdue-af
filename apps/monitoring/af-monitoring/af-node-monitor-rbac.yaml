apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: af-node-monitor-role
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: af-node-monitor
automountServiceAccountToken: true

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: af-node-monitor-rb
subjects:
  - kind: ServiceAccount
    name: af-node-monitor
roleRef:
  kind: Role
  name: af-node-monitor-role
  apiGroup: rbac.authorization.k8s.io

