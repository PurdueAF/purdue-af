apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: af-node-monitor-depot-worker
spec:
  selector:
    matchLabels:
      name: af-node-monitor-depot-worker
  template:
    metadata:
      labels:
        name: af-node-monitor-depot-worker
    spec:
      enableServiceLinks: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cms-af-prod
                    operator: In
                    values:
                      - "true"
              - matchExpressions:
                  - key: cms-af-dev
                    operator: In
                    values:
                      - "true"
      tolerations:
        - key: "hub.jupyter.org/dedicated"
          operator: "Equal"
          value: "cms-af"
          effect: "NoSchedule"
      containers:
        - name: mount-worker
          image: python:3.11-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              apt-get update && apt-get install -y fio && rm -rf /var/lib/apt/lists/*
              python /scripts/mount_worker.py
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          env:
            - name: MOUNT_NAME
              value: "/depot/"
            - name: CHECK_FILE
              value: "/depot/cms/purdue-af/validate-mount.txt"
            - name: CHECKSUM
              value: "13dede34ee8dc7e5b70c9cd06ac15467"
            - name: METADATA_DIR
              value: "/depot/cms/"
            - name: FIO_FILE
              value: "/depot/cms/purdue-af/.storage-monitoring-probe-1gb"
            - name: ENABLE_FIO
              value: "true"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: depot
              mountPath: /depot/cms
              mountPropagation: HostToContainer
      volumes:
        - name: scripts
          configMap:
            name: af-node-monitor-worker-config
        - name: depot
          nfs:
            server: datadepot.rcac.purdue.edu
            path: /depot/cms
---
apiVersion: v1
kind: Service
metadata:
  name: af-node-monitor-depot-worker
spec:
  selector:
    name: af-node-monitor-depot-worker
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
