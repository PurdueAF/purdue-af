apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 1m
  timeout: 20m
  chart:
    spec:
      chart: alloy
      version: "1.10.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 1m
  install:
    timeout: 20m
    remediation:
      retries: -1
  upgrade:
    timeout: 20m
    cleanupOnFail: true
    remediation:
      retries: -1
      strategy: rollback
  rollback:
    timeout: 15m
  valuesFrom:
    - kind: ConfigMap
      name: alloy-config
      valuesKey: values.yaml
