# Chart: grafana/alloy

controller:
  type: daemonset
  replicas: 1
  service:
    enabled: false
  tolerations:
    - key: "hub.jupyter.org/dedicated"
      operator: "Equal"
      value: "cms-af"
      effect: "NoSchedule"
  nodeSelector:
    cms-af-prod: "true"

serviceAccount:
  create: true

rbac:
  create: true

alloy:
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 512Mi
  configMap:
    create: true
    # River configuration: collect Kubernetes pod logs and send to Loki
    content: |
      logging {
        level = "info"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
        namespaces {
          names = ["cms"]
        }
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
        }
        // dask scheduler/worker pods carry username in the 'user' label
        rule {
          source_labels = ["__meta_kubernetes_pod_label_user"]
          regex         = "(.+)"
          target_label  = "username"
        }
        // purdue-af (jupyterhub singleuser) pods carry username in 'username_unescaped'
        rule {
          source_labels = ["__meta_kubernetes_pod_label_username_unescaped"]
          regex         = "(.+)"
          target_label  = "username"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.pods.receiver]
      }

      loki.process "pods" {
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.cms.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // eBPF profiling removed due to cluster policy; Alloy is used only for logs
