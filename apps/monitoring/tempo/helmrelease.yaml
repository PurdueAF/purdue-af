apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tempo
spec:
  interval: 1m
  chart:
    spec:
      chart: tempo
      version: "1.24.4"
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 1m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  valuesFrom:
    - kind: ConfigMap
      name: tempo-config
      valuesKey: values.yaml
  # grafana/tempo chart has no init container support; inject one via postRenderer
  # to fix PVC root ownership before Tempo starts (CephFS ignores fsGroup on new PVCs)
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: tempo
              spec:
                template:
                  spec:
                    initContainers:
                      - name: fix-permissions
                        image: geddes-registry.rcac.purdue.edu/docker-hub-cache/library/busybox:1.36
                        command: ["/bin/sh", "-c", "mkdir -p /var/tempo/traces /var/tempo/wal && chmod -R 777 /var/tempo"]
                        securityContext:
                          runAsUser: 0
                          runAsNonRoot: false
                        volumeMounts:
                          - name: storage
                            mountPath: /var/tempo
            target:
              kind: StatefulSet
              name: tempo
