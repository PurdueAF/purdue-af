apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: servicex-interlink
spec:
  suspend: false
  interval: 1m
  chart:
    spec:
      # chart: helm/servicex
      # sourceRef:
      #   kind: GitRepository
      #   name: servicex
      chart: servicex
      version: "1.8.3"
      sourceRef:
        kind: HelmRepository
        name: ssl-hep
      interval: 1m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  valuesFrom:
    - kind: ConfigMap
      name: servicex-interlink-config
      valuesKey: values.yaml
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: "servicex-interlink-servicex-app"
            patch: |
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: patched-transformer-manager
                  emptyDir: {}
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: transformer-manager-patch
                  configMap:
                    name: servicex-interlink-transformer-manager-patch
                    defaultMode: 493
              - op: add
                path: /spec/template/spec/initContainers/-
                value:
                  name: patch-transformer-manager
                  image: sslhep/servicex_app:v1.8.3
                  imagePullPolicy: IfNotPresent
                  command:
                    - sh
                    - -c
                    - |
                      cp /home/servicex/servicex_app/servicex_app/transformer_manager.py /patch/transformer_manager.py
                      python3 /patch-script/patch-transformer-manager.py
                  volumeMounts:
                    - name: patched-transformer-manager
                      mountPath: /patch
                    - name: transformer-manager-patch
                      mountPath: /patch-script
                      readOnly: true
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: patched-transformer-manager
                  mountPath: /home/servicex/servicex_app/servicex_app/transformer_manager.py
                  subPath: transformer_manager.py
          - target:
              kind: Deployment
              name: "servicex-interlink-did-finder-xrootd"
            patch: |
              - op: add
                path: /spec/template/spec/volumes
                value: []
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: x509-proxy
                  secret:
                    secretName: x509-proxy
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts
                value: []
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: x509-proxy
                  mountPath: /etc/grid-security-ro
                  mountPropagation: HostToContainer
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: X509_USER_PROXY
                  value: /etc/grid-security-ro/x509up
