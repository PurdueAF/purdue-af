serverLoadThreshold: 100

triton:
  # image: nvcr.io/nvidia/tritonserver:24.11-py3
  image: fastml/triton-torchgeo:22.07-py3-geometric
  # image: fastml/triton-torchgeo:25.08-py3-geometric
  command: ["/bin/sh", "-c"]
  args:
    - |
      /opt/tritonserver/bin/tritonserver \
      --model-repository=/work/triton_models/ \
      --allow-gpu-metrics=true \
      --log-verbose=0 \
      --disable-auto-complete-config \
      --exit-timeout-secs=60

  resources:
    limits:
      nvidia.com/mig-1g.5gb: 1
      cpu: 2
      memory: 8G
    requests:
      nvidia.com/mig-1g.5gb: 1
      cpu: 2
      memory: 8G
  nodeSelector: { "cms-af-prod": "true" }
  tolerations:
    - key: hub.jupyter.org/dedicated
      operator: Equal
      value: cms-af
      effect: NoSchedule
  service:
    labels:
      scrape_metrics: "true"
    annotations:
      metallb.universe.tf/address-pool: geddes-private-pool
  modelRepository:
    enabled: true
    storageType: pvc
    pvc:
      claimName: af-shared-storage
    mountPath: /work/
  readinessProbe:
    successThreshold: 3
  #   reset: true

envoy:
  enabled: true
  nodeSelector: { "cms-af-prod": "true" }
  tolerations:
    - key: hub.jupyter.org/dedicated
      operator: Equal
      value: cms-af
      effect: NoSchedule
  loadBalancerPolicy: "ROUND_ROBIN"
  service:
    type: LoadBalancer
  ingress:
    enabled: true
    hostName: supersonic.geddes.rcac.purdue.edu
    ingressClassName: public
  rate_limiter:
    prometheus_based:
      enabled: false
    listener_level:
      enabled: false
  dynamic_routing:
    enabled: true
  lua_filter:
    enabled: true
    lua_config: "cfg/envoy-filter-dynamic.lua"

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 10
  scaleUp:
    stabilizationWindowSeconds: 30
    periodSeconds: 15
    stepsize: 1
  scaleDown:
    stabilizationWindowSeconds: 45
    periodSeconds: 45
    stepsize: 1

ingress:
  enabled: false

prometheus:
  external:
    enabled: true
    url: rancher-monitoring-prometheus.cattle-monitoring-system
    port: 9090
    scheme: http

grafana:
  enabled: true
  dashboardsConfigMaps:
    default: supersonic-grafana-default-dashboard
  datasources:
    datasources.yaml:
      datasources:
        - name: prometheus
          type: prometheus
          access: proxy
          isDefault: true
          url: http://supersonic-prometheus-server:9090
          jsonData:
            timeInterval: "5s"
            tlsSkipVerify: true
        - name: tempo
          type: tempo
          url: http://supersonic-tempo:3100
          access: proxy
          isDefault: false
          basicAuth: false
          jsonData:
            timeInterval: "5s"
            tlsSkipVerify: true
            serviceMap:
              datasourceUid: "prometheus"
            nodeGraph:
              enabled: true
  ingress:
    enabled: true
    hosts:
      - supersonic-grafana.geddes.rcac.purdue.edu
    tls:
      - hosts:
          - supersonic-grafana.geddes.rcac.purdue.edu
    ingressClassName: public
  grafana.ini:
    server:
      root_url: https://supersonic-grafana.geddes.rcac.purdue.edu
